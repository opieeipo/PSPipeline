function cyclePalette() {
  paletteMode = PALETTE_MODES[(PALETTE_MODES.indexOf(paletteMode) + 1) % PALETTE_MODES.length];
  const pal = document.getElementById('palette');
  pal.classList.remove('compress', 'collapse');
  if (paletteMode !== 'expanded') pal.classList.add(paletteMode);
  const b = document.getElementById('btn-palette-toggle');
  if (b) b.textContent = paletteMode === 'collapse' ? '»' : (paletteMode === 'compress' ? 'Compress' : 'Expanded');
}

// --- Palette ---------------------------------------------------------------
(function buildPalette() {
  const palette = document.getElementById('palette');
  const palHead = document.createElement('div'); palHead.className = 'pal-head';
  const toggle = document.createElement('button'); toggle.id = 'btn-palette-toggle';
  toggle.textContent = 'Expanded'; toggle.title = 'Cycle palette view: Expanded / Compress / Collapse';
  toggle.addEventListener('click', cyclePalette);
  palHead.appendChild(toggle); palette.appendChild(palHead);
  const groups = { input: 'Inputs', transform: 'Transforms', output: 'Outputs' };
  for (const [cat, title] of Object.entries(groups)) {
    const h = document.createElement('h2');
    h.textContent = title;
    palette.appendChild(h);
    for (const [type, def] of Object.entries(NODE_TYPES)) {
      if (def.cat !== cat) continue;
      const item = document.createElement('div');
      item.className = 'palette-item cat-' + cat;
      item.title = def.name;
      const ic = document.createElement('span'); ic.className = 'pi-icon'; ic.textContent = iconFor(type);
      const lb = document.createElement('span'); lb.className = 'pi-label'; lb.textContent = def.name;
      item.appendChild(ic); item.appendChild(lb);
      item.draggable = true;
      item.addEventListener('dragstart', e => e.dataTransfer.setData('node-type', type));
      item.addEventListener('click', () => addNode(type, 80 + nodes.length * 16, 80 + nodes.length * 16));
      palette.appendChild(item);
    }
  }
})();

// --- Canvas drop: palette items and real data files ------------------------
canvas.parentElement.addEventListener('dragover', e => e.preventDefault());
canvas.parentElement.addEventListener('drop', e => {
  e.preventDefault();
  const p = toCanvas(e.clientX, e.clientY);
  const x = p.x, y = p.y;
  const type = e.dataTransfer.getData('node-type');
  if (type) { addNode(type, x, y); return; }
  // Dropping a real file creates a matching input node. Browsers only expose
  // the file NAME (not its full path) — edit the path in the properties panel.
  for (const file of e.dataTransfer.files) {
    const ext = file.name.split('.').pop().toLowerCase();
    const map = { csv: 'input.csv', tsv: 'input.csv', tab: 'input.csv', txt: 'input.csv', json: 'input.json' };
    if (map[ext]) {
      const n = addNode(map[ext], x, y);
      n.config.path = file.name;
      n.label = file.name;
      if (ext === 'tsv' || ext === 'tab') n.config.delimiter = '\t';
      // Load the dropped file as sample data immediately so preview works without
      // a second manual pick.
      loadSampleIntoNode(n, file).then(parsed => {
        renderAll(); selectNode(n.id);
        setStatus('Loaded ' + parsed.rows.length + ' sample rows from "' + file.name + '". Set its full runtime path in the properties panel.');
      }).catch(err => {
        renderAll(); selectNode(n.id);
        setStatus('Added input for "' + file.name + '"; sample could not be parsed (' + err.message + ').');
      });
    }
  }
});

// --- Node CRUD ---------------------------------------------------------------
function addNode(type, x, y) {
  snapshotState();
  const def = NODE_TYPES[type];
  const node = { id: 'n' + (nextId++), type, label: def.name, x: Math.max(0, x), y: Math.max(0, y), config: {} };
  if (type === 'transform.join') node.config.joinType = 'Inner';
  if (type === 'transform.filter') node.config.match = 'All';
  nodes.push(node);
  renderAll(); selectNode(node.id);
  return node;
}

function deleteNode(id) {
  snapshotState();
  nodes = nodes.filter(n => n.id !== id);
  edges = edges.filter(e => e.from !== id && e.to !== id);
  selection.delete(id); if (selectedNode === id) selectedNode = null;
  renderAll(); renderProps();
}

// --- Rendering ----------------------------------------------------------------
function renderAll() { renderNodes(); renderEdges(); }

function renderNodes() {
  canvas.querySelectorAll('.node').forEach(el => el.remove());
  for (const node of nodes) {
    const def = nodeType(node);
    const el = document.createElement('div');
    el.className = 'node cat-' + def.cat + (selection.has(node.id) ? ' selected' : '');
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    el.dataset.id = node.id;

    const head = document.createElement('div');
    head.className = 'head';
    const hIcon = document.createElement('span'); hIcon.className = 'nh-icon'; hIcon.textContent = iconFor(node.type);
    const hText = document.createElement('span'); hText.textContent = node.label;
    head.appendChild(hIcon); head.appendChild(hText);
    el.appendChild(head);

    const body = document.createElement('div');
    body.className = 'body';
    body.textContent = summarize(node);
    el.appendChild(body);

    def.inputs.forEach((port, i) => {
      const p = document.createElement('div');
      p.className = 'port in';
      p.style.top = (34 + i * 22) + 'px';
      p.dataset.port = port;
      p.title = 'input: ' + port;
      el.appendChild(p);
      if (def.inputs.length > 1) {
        const lbl = document.createElement('div');
        lbl.className = 'port-label';
        lbl.style.top = (34 + i * 22) + 'px';
        lbl.textContent = port;
        el.appendChild(lbl);
      }
      // Stop mousedown here: otherwise it bubbles to the node's select handler,
      // which re-renders every node and destroys this port before the click lands.
      p.addEventListener('mousedown', ev => ev.stopPropagation());
      p.addEventListener('click', ev => { ev.stopPropagation(); finishEdge(node.id, port); });
    });

    if (def.cat !== 'output' || true) {  // outputs pass data through, so every node has an out port
      const p = document.createElement('div');
      p.className = 'port out' + (pendingFrom === node.id ? ' armed' : '');
      el.appendChild(p);
      // Output port supports BOTH click-to-arm and drag-to-connect. stopPropagation
      // keeps the node's select/drag handler from firing when interacting with the port.
      p.addEventListener('mousedown', ev => { ev.stopPropagation(); ev.preventDefault(); beginLink(node.id, ev); });
    }

    el.addEventListener('mousedown', ev => handleNodeMouseDown(node, ev));
    canvas.appendChild(el);
  }
}

function summarize(node) {
  const c = node.config;
  switch (node.type) {
    case 'input.csv': case 'input.fixedwidth': case 'input.json':
    case 'output.csv': case 'output.json':
      return c.path || '(no path set)';
    case 'transform.join':
      return (c.joinType || 'Inner') + ' on ' + (c.leftKey || '?') + ' = ' + (c.rightKey || '?');
    case 'transform.filter':
      return (c.conditions ? c.conditions.length : 0) + ' condition(s), match ' + (c.match || 'All');
    case 'transform.aggregate':
      return 'by ' + ((c.groupBy || []).join(', ') || '?');
    case 'transform.select': case 'transform.drop':
      return (c.columns || []).join(', ') || '(no columns)';
    case 'transform.derive':
      return c.name ? c.name + ' = ' + (c.template || '') : '(not configured)';
    default: return node.type;
  }
}

function portPosition(nodeId, port) {
  const node = byId(nodeId);
  const def = nodeType(node);
  if (port === 'out') return { x: node.x + 168, y: node.y + 40 };
  const index = Math.max(0, def.inputs.indexOf(port));
  return { x: node.x, y: node.y + 40 + index * 22 };
}

function renderEdges() {
  edgesSvg.innerHTML = '';
  edges.forEach((edge, i) => {
    const a = portPosition(edge.from, 'out');
    const b = portPosition(edge.to, edge.toPort);
    const dx = Math.max(40, Math.abs(b.x - a.x) / 2);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`);
    if (i === selectedEdge) path.classList.add('selected');
    path.addEventListener('click', ev => { ev.stopPropagation(); selectedEdge = i; selection.clear(); selectedNode = null; renderAll(); renderProps(); });
    edgesSvg.appendChild(path);
  });
}

// --- Edge creation ------------------------------------------------------------
function startEdge(fromId) {
  pendingFrom = (pendingFrom === fromId) ? null : fromId;
  renderNodes();
  setStatus(pendingFrom ? 'Now click an input port on the destination node…' : 'Connection cancelled.');
}

function finishEdge(toId, toPort) {
  if (!pendingFrom) { setStatus('Click an output port first, then an input port.'); return; }
  if (pendingFrom === toId) { setStatus('Cannot connect a node to itself.'); return; }
  const dest = byId(toId);
  const multi = dest && dest.type === 'transform.union';   // union accepts many edges into one port
  snapshotState();
  if (!multi) edges = edges.filter(e => !(e.to === toId && e.toPort === toPort)); // one edge per input port
  if (!edges.some(e => e.from === pendingFrom && e.to === toId && e.toPort === toPort)) {
    edges.push({ from: pendingFrom, to: toId, toPort });
  }
  pendingFrom = null;
  renderAll();
  setStatus('Connected.');
}

// Drag-to-connect: press an output port and drag a live link to an input port.
// A plain press-release (no movement) falls back to click-to-arm.
function beginLink(fromId, ev) {
  const a = portPosition(fromId, 'out');
  let moved = false;
  const temp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  temp.setAttribute('class', 'pending');
  edgesSvg.appendChild(temp);
  function mm(e) {
    moved = true;
    const c = toCanvas(e.clientX, e.clientY);
    const dx = Math.max(40, Math.abs(c.x - a.x) / 2);
    temp.setAttribute('d', 'M ' + a.x + ' ' + a.y + ' C ' + (a.x + dx) + ' ' + a.y + ', ' + (c.x - dx) + ' ' + c.y + ', ' + c.x + ' ' + c.y);
  }
  function mu(e) {
    document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu);
    temp.remove();
    if (!moved) { startEdge(fromId); return; }   // plain click on the output port arms it
    const el = document.elementFromPoint(e.clientX, e.clientY);
    if (el && el.classList.contains('port') && el.classList.contains('in')) {
      const nodeEl = el.closest('.node');
      const toId = nodeEl && nodeEl.dataset.id;
      if (toId) { pendingFrom = fromId; finishEdge(toId, el.dataset.port || 'in'); return; }
    }
    pendingFrom = null; renderNodes(); setStatus('Link cancelled.');
  }
  document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
}

// --- Node dragging --------------------------------------------------------------
function beginDrag(ev) {
  ev.preventDefault();
  const startX = ev.clientX, startY = ev.clientY;
  const moving = [...selection].map(byId).filter(Boolean);
  if (!moving.length) return;
  const orig = new Map(moving.map(n => [n.id, { x: n.x, y: n.y }]));
  let moved = false;
  function move(e) {
    if (!moved) { snapshotState(); moved = true; }
    const dx = (e.clientX - startX) / zoom, dy = (e.clientY - startY) / zoom;
    moving.forEach(n => {
      const o = orig.get(n.id);
      n.x = Math.max(0, o.x + dx); n.y = Math.max(0, o.y + dy);
      const el = canvas.querySelector('.node[data-id="' + n.id + '"]');
      if (el) { el.style.left = n.x + 'px'; el.style.top = n.y + 'px'; }
    });
    renderEdges();
  }
  function up() { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); }
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

// --- Selection / properties panel ---------------------------------------------
function selectNode(id) { setSelection([id]); }

canvas.addEventListener('mousedown', e => {
  if (e.target !== canvas && e.target !== edgesSvg) return;   // empty-canvas only
  pendingFrom = null;
  const start = toCanvas(e.clientX, e.clientY);
  const box = document.createElement('div'); box.className = 'marquee'; canvas.appendChild(box);
  let dragged = false;
  function rect(ev) {
    const cur = toCanvas(ev.clientX, ev.clientY);
    return { x1: Math.min(start.x, cur.x), y1: Math.min(start.y, cur.y), x2: Math.max(start.x, cur.x), y2: Math.max(start.y, cur.y) };
  }
  function mm(ev) {
    dragged = true;
    const r = rect(ev);
    box.style.left = r.x1 + 'px'; box.style.top = r.y1 + 'px';
    box.style.width = (r.x2 - r.x1) + 'px'; box.style.height = (r.y2 - r.y1) + 'px';
  }
  function mu(ev) {
    document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu);
    box.remove();
    if (!dragged) { setSelection([]); return; }   // plain click on empty canvas clears selection
    const r = rect(ev);
    const hit = nodes.filter(n => n.x < r.x2 && n.x + 168 > r.x1 && n.y < r.y2 && n.y + nodeHeight() > r.y1).map(n => n.id);
    const base = (ev.shiftKey || ev.ctrlKey || ev.metaKey) ? [...selection] : [];
    setSelection([...new Set([...base, ...hit])]);
  }
  document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
});

document.addEventListener('keydown', e => {
  const inField = document.activeElement && /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName);
  const key = e.key.toLowerCase();
  if ((e.ctrlKey || e.metaKey) && key === 'z' && !e.shiftKey) {
    if (inField) return;            // let the browser undo text edits in a focused field
    e.preventDefault(); undo(); return;
  }
  if ((e.ctrlKey || e.metaKey) && (key === 'y' || (key === 'z' && e.shiftKey))) {
    if (inField) return;
    e.preventDefault(); redo(); return;
  }
  if (e.key !== 'Delete' && e.key !== 'Backspace') return;
  if (inField) return;
  if (selectedEdge !== null) { snapshotState(); edges.splice(selectedEdge, 1); selectedEdge = null; renderAll(); }
  else if (selection.size) deleteSelected();
});

// --- Schema awareness: sample data + column propagation ---------------------
// Real sample rows live only at input nodes (loaded via the File API, never
// saved into the pipeline JSON). Column names propagate through the whole DAG
// by computation here. Row-level preview is computed separately by the embedded
// preview executor (samplerun.js), verified against the PowerShell output.
let sampleData = {};   // nodeId -> { columns: [], rows: [[]] }

function edgeInto(id, port) {
  const e = edges.find(e => e.to === id && (e.toPort || 'in') === (port || 'in'));
  return e ? e.from : null;
}

function outputColumns(id, stack) {
  stack = stack || {};
  if (stack[id]) return [];            // cycle guard
  stack[id] = 1;
  const node = byId(id);
  let res = [];
  if (node) {
    const cfg = node.config || {};
    const inc = port => { const s = edgeInto(id, port); return s ? outputColumns(s, stack) : []; };
    switch (node.type) {
      case 'input.csv': case 'input.json': res = sampleData[id] ? sampleData[id].columns.slice() : []; break;
      case 'input.fixedwidth': res = (cfg.columns || []).map(c => c.name).filter(Boolean); break;
      case 'transform.select': res = (cfg.columns || []).slice(); break;
      case 'transform.drop': { const d = cfg.columns || []; res = inc('in').filter(c => d.indexOf(c) < 0); break; }
      case 'transform.rename': { const m = {}; (cfg.renames || []).forEach(r => { m[r.from] = r.to; }); res = inc('in').map(c => m[c] || c); break; }
      case 'transform.reorder': { const c = inc('in'); const ord = (cfg.order || []).filter(x => c.indexOf(x) >= 0); res = ord.concat(c.filter(x => ord.indexOf(x) < 0)); break; }
      case 'transform.derive': res = inc('in').concat(cfg.name ? [cfg.name] : []); break;
      case 'transform.filter': case 'transform.sort': case 'transform.distinct': res = inc('in'); break;
      case 'transform.join': { const l = inc('left'), r = inc('right'); const ls = {}; l.forEach(c => { ls[c] = 1; }); res = l.concat(r.map(c => ls[c] ? 'Right_' + c : c)); break; }
      case 'transform.aggregate': res = (cfg.groupBy || []).concat((cfg.aggregations || []).map(a => a.as || (a.function + '_' + a.column))); break;
      case 'transform.limit': case 'transform.replace': case 'transform.fill': res = inc('in'); break;
      case 'transform.index': res = inc('in').concat([cfg.name || 'Index']); break;
      case 'transform.conditional': res = inc('in').concat(cfg.name ? [cfg.name] : []); break;
      case 'transform.text': res = inc('in').concat(cfg.as ? [cfg.as] : []); break;
      case 'transform.union': { const sn = {}; res = []; (edges || []).filter(e => e.to === id).map(e => e.from).forEach(sid => outputColumns(sid, stack).forEach(c => { if (!sn[c]) { sn[c] = 1; res.push(c); } })); break; }
      case 'transform.date': { const c = inc('in'); res = (cfg.as && c.indexOf(cfg.as) < 0) ? c.concat([cfg.as]) : c; break; }
      case 'transform.cast': res = inc('in'); break;
      case 'transform.unpivot': res = (cfg.keep || []).concat([cfg.attributeName || 'Attribute', cfg.valueName || 'Value']); break;
      case 'transform.pivot': res = (cfg.groupBy || []).slice(); break;  // pivot value columns are data-dependent; preview fills them in
      case 'output.csv': case 'output.json': res = inc('in'); break;
    }
  }
  delete stack[id];
  return res;
}
function inputColumns(node, port) { const s = edgeInto(node.id, port || 'in'); return s ? outputColumns(s) : []; }

// --- Sample parsers (File API, fully offline) -------------------------------
function csvSplitLine(line, D) {
  const out = []; let f = '', inq = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inq) { if (c === '"') { if (line[i + 1] === '"') { f += '"'; i++; } else inq = false; } else f += c; }
    else { if (c === '"') inq = true; else if (c === D) { out.push(f); f = ''; } else f += c; }
  }
  out.push(f); return out;
}
function splitLines(text) { return text.replace(/\r\n?/g, '\n').split('\n').filter(l => l.length > 0); }
function parseDelimitedSample(text, delim) {
  const lines = splitLines(text); if (!lines.length) return { columns: [], rows: [] };
  const D = delim || ',';
  return { columns: csvSplitLine(lines[0], D), rows: lines.slice(1, 201).map(l => csvSplitLine(l, D)) };
}
function parseFixedSample(text, columns, skip) {
  const lines = splitLines(text).slice(skip || 0);
  const cols = columns || [];
  return {
    columns: cols.map(c => c.name),
    rows: lines.slice(0, 201).map(l => cols.map(c => l.substr((c.start || 1) - 1, c.length || 0).replace(/^\s+|\s+$/g, '')))
  };
}
function parseJsonSample(text) {
  const data = JSON.parse(text);
  const arr = Array.isArray(data) ? data : [data];
  const columns = [], seen = {};
  arr.forEach(o => { if (o && typeof o === 'object') Object.keys(o).forEach(k => { if (!seen[k]) { seen[k] = 1; columns.push(k); } }); });
  return { columns, rows: arr.slice(0, 201).map(o => columns.map(k => (o && o[k] != null) ? String(o[k]) : '')) };
}

// --- Field-control helpers --------------------------------------------------
function addHint(box, text) { const h = document.createElement('div'); h.className = 'hint'; h.textContent = text; box.appendChild(h); }
function selEl(options, current, onChange) {
  const s = document.createElement('select');
  options.forEach(o => { const op = document.createElement('option'); op.value = o; op.textContent = o; if (o === current) op.selected = true; s.appendChild(op); });
  s.addEventListener('change', () => { snapshotState(); onChange(s.value); });
  return s;
}
function txtEl(value, onChange, ph) {
  const i = document.createElement('input'); i.type = 'text'; i.value = value || ''; if (ph) i.placeholder = ph;
  i.addEventListener('change', () => { snapshotState(); onChange(i.value); });
  return i;
}
function colInput(value, columns, onChange) {
  if (columns && columns.length) {
    const s = document.createElement('select');
    const blank = document.createElement('option'); blank.value = ''; blank.textContent = '(column)'; s.appendChild(blank);
    let found = false;
    columns.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; if (c === value) { o.selected = true; found = true; } s.appendChild(o); });
    if (value && !found) { const o = document.createElement('option'); o.value = value; o.textContent = value + ' (not in input)'; o.selected = true; s.appendChild(o); }
    s.addEventListener('change', () => { snapshotState(); onChange(s.value); });
    return s;
  }
  return txtEl(value, onChange, 'column name');
}

// --- Field renderers --------------------------------------------------------
function renderColumns(box, node, field, columns) {
  const label = document.createElement('label'); label.textContent = field.label; box.appendChild(label);
  const cur = node.config[field.key] || [];
  if (columns && columns.length) {
    const wrap = document.createElement('div'); wrap.className = 'chk';
    const ordered = columns.slice(); cur.forEach(c => { if (ordered.indexOf(c) < 0) ordered.push(c); });
    ordered.forEach(c => {
      const row = document.createElement('label'); row.className = 'chkrow';
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = cur.indexOf(c) >= 0;
      cb.addEventListener('change', () => {
        snapshotState();
        let arr = (node.config[field.key] || []).slice();
        if (cb.checked) { if (arr.indexOf(c) < 0) arr.push(c); } else arr = arr.filter(x => x !== c);
        node.config[field.key] = arr; renderNodes();
      });
      row.appendChild(cb); row.appendChild(document.createTextNode(' ' + c)); wrap.appendChild(row);
    });
    box.appendChild(wrap);
  } else {
    addField(box, '', 'text', cur.join(', '), v => { node.config[field.key] = v.split(',').map(s => s.trim()).filter(Boolean); renderNodes(); }, 'comma separated column names');
  }
  if (field.hint) addHint(box, field.hint);
}
function renderColumnField(box, node, field, columns) {
  const label = document.createElement('label'); label.textContent = field.label; box.appendChild(label);
  box.appendChild(colInput(node.config[field.key], columns, v => { node.config[field.key] = v; renderNodes(); }));
}
function renderReorder(box, node, field, columns) {
  const label = document.createElement('label'); label.textContent = field.label; box.appendChild(label);
  if (!columns || !columns.length) {
    const cur = node.config[field.key] || [];
    addField(box, '', 'text', cur.join(', '), v => { node.config[field.key] = v.split(',').map(s => s.trim()).filter(Boolean); renderNodes(); }, 'comma separated; load a sample to use the arrows');
    if (field.hint) addHint(box, field.hint);
    return;
  }
  // Effective order: stored order (still present) first, then any new input columns appended.
  const stored = (node.config[field.key] || []).slice();
  const ordered = stored.filter(c => columns.indexOf(c) >= 0);
  columns.forEach(c => { if (ordered.indexOf(c) < 0) ordered.push(c); });
  node.config[field.key] = ordered.slice();   // persist the full order so codegen reorders
  const wrap = document.createElement('div'); wrap.className = 'chk';
  function move(i, d) {
    const arr = node.config[field.key].slice();
    const j = i + d; if (j < 0 || j >= arr.length) return;
    const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    snapshotState(); node.config[field.key] = arr; renderProps(); renderNodes();
  }
  ordered.forEach((c, i) => {
    const row = document.createElement('div'); row.className = 'builder-row';
    const up = document.createElement('button'); up.className = 'builder-rm'; up.textContent = '▲'; up.title = 'move up'; up.disabled = (i === 0);
    up.addEventListener('click', () => move(i, -1));
    const dn = document.createElement('button'); dn.className = 'builder-rm'; dn.textContent = '▼'; dn.title = 'move down'; dn.disabled = (i === ordered.length - 1);
    dn.addEventListener('click', () => move(i, 1));
    const nm = document.createElement('span'); nm.textContent = ' ' + c; nm.style.flex = '1';

function renderProfile(panel, cols, rows) {
  if (!rows.length || !cols.length) return;
  const numRe = /^[ \t]*[-+]?([0-9]+([.][0-9]*)?|[.][0-9]+)([eE][-+]?[0-9]+)?[ \t]*$/;
  const note = document.createElement('div'); note.className = 'preview-note';
  note.textContent = 'Column profile (' + rows.length + ' sample rows):'; panel.appendChild(note);
  const tbl = document.createElement('table');
  const hr = document.createElement('tr');
  ['Column', 'Filled', 'Distinct', 'Min', 'Max'].forEach(h => { const th = document.createElement('th'); th.textContent = h; hr.appendChild(th); });
  tbl.appendChild(hr);
  cols.forEach((name, i) => {
    let filled = 0; const seen = {}; let distinct = 0, allNum = true; const vals = [];
    rows.forEach(r => { const v = r[i] == null ? '' : String(r[i]); if (v !== '') { filled++; if (!seen[v]) { seen[v] = 1; distinct++; } if (!numRe.test(v)) allNum = false; vals.push(v); } });
    let mn = '', mx = '';
    if (vals.length) {
      if (allNum) { let lo = +vals[0], hi = +vals[0]; vals.forEach(v => { const n = +v; if (n < lo) lo = n; if (n > hi) hi = n; }); mn = String(lo); mx = String(hi); }
      else { let lo = vals[0], hi = vals[0]; vals.forEach(v => { if (v.toLowerCase() < lo.toLowerCase()) lo = v; if (v.toLowerCase() > hi.toLowerCase()) hi = v; }); mn = lo; mx = hi; }
    }
    const tr = document.createElement('tr');
    [name, String(filled), String(distinct), mn, mx].forEach((cv, j) => { const td = document.createElement('td'); td.textContent = cv; td.title = cv; if (j === 0) td.style.color = 'var(--accent)'; tr.appendChild(td); });
    tbl.appendChild(tr);
  });
  panel.appendChild(tbl);
}

// --- Sample loader + preview ------------------------------------------------
// Read a dropped or picked file into the node's sample data. Shared by the
// properties-panel picker and the canvas drag-and-drop so both behave identically
// (the drop path used to set the path but never load the sample, so preview stayed empty).
function loadSampleIntoNode(node, file, keepPath) {
  return file.text().then(text => {
    let parsed;
    if (node.type === 'input.fixedwidth') parsed = parseFixedSample(text, node.config.columns || [], parseInt(node.config.skipLines || 0, 10));
    else if (node.type === 'input.json') parsed = parseJsonSample(text);
    else parsed = parseDelimitedSample(text, node.config.delimiter || ',');
    sampleData[node.id] = parsed;
    // The picker/drop seed the read-only path from the picked file; relink keeps the
    // pipeline's existing runtime path and only refreshes the in-memory sample.
    if (!keepPath) node.config.path = file.name;
    return parsed;
  });
}
function renderSampleLoader(box, node) {
  const label = document.createElement('label'); label.textContent = 'Sample data (preview only, not saved)'; box.appendChild(label);
  const f = document.createElement('input'); f.type = 'file';
  f.accept = node.type === 'input.json' ? '.json' : '.csv,.tsv,.txt';
  f.addEventListener('change', () => {
    const file = f.files && f.files[0]; if (!file) return;
    loadSampleIntoNode(node, file).then(parsed => {
      setStatus('Loaded ' + parsed.rows.length + ' sample rows, ' + parsed.columns.length + ' columns from ' + file.name + '.');
      renderProps(); renderNodes();
    }).catch(err => setStatus('Could not parse sample: ' + err.message));
  });
  box.appendChild(f);
  addHint(box, 'Preview only, never saved. Seeds the runtime path above if it is empty.');
}
function renderPreviewPanel(node) {

  // Live preview: run the loaded sample rows through the DAG to this node.
  let exec = null;
  try { if (typeof runSampleEngine === 'function') exec = runSampleEngine(toDefinition(), sampleData)[node.id]; } catch (e) { exec = null; }
  const cols = (exec && exec.columns && exec.columns.length) ? exec.columns : outputColumns(node.id);
  const rows = (exec && exec.rows) ? exec.rows : [];

  const head = document.createElement('div'); head.className = 'preview-head';

function renderProps() {
  const box = document.getElementById('props-body');
  box.innerHTML = '';
  if (selection.size > 1) {
    const p = document.createElement('p'); p.className = 'hint'; p.textContent = selection.size + ' nodes selected. Drag to move them together.';
    box.appendChild(p);
    const del = document.createElement('button'); del.className = 'danger'; del.textContent = 'Delete ' + selection.size + ' nodes';
    del.addEventListener('click', deleteSelected); box.appendChild(del);

  }
  const node = byId(selectedNode);
  if (!node) {
    renderParamsEditor(box);
    const tip = document.createElement('p'); tip.className = 'hint';
    tip.textContent = 'Select a node to edit it. Tip: drag a .csv / .tsv / .txt / .json file onto the canvas to create an input node.';
    box.appendChild(tip);
    renderPreviewPanel(null);
    return;
  }
  const def = nodeType(node);

  addField(box, 'Label', 'text', node.label, v => { node.label = v; renderNodes(); });

  const inCols = inputColumns(node, 'in');
  for (const field of def.fields) {
    const current = node.config[field.key];
    if (field.type === 'columns') {
      renderColumns(box, node, field, inCols);
    } else if (field.type === 'reorder') {
      renderReorder(box, node, field, inCols);
    } else if (field.type === 'column') {
      renderColumnField(box, node, field, inputColumns(node, field.port || 'in'));
    } else if (field.type === 'conditions') {
      renderConditions(box, node, field, inCols);
    } else if (field.type === 'sortBy') {
      renderSortBy(box, node, field, inCols);
    } else if (field.type === 'aggregations') {
      renderAggregations(box, node, field, inCols);
    } else if (field.type === 'renames') {
      renderRenames(box, node, field, inCols);
    } else if (field.type === 'rules') {
      renderRules(box, node, field, inCols);
    } else if (field.type === 'checkbox') {
      renderCheckbox(box, node, field);
    } else if (field.type === 'list') {
      addField(box, field.label, 'text', (current || []).join(', '), v => {
        node.config[field.key] = v.split(',').map(s => s.trim()).filter(Boolean);
        renderNodes();
      });
    } else if (field.type === 'select') {
      const label = document.createElement('label'); label.textContent = field.label; box.appendChild(label);
      const sel = document.createElement('select');
      // Options may be plain strings or { label, value } pairs (value can differ
      // from the displayed text, e.g. a Tab delimiter shown as "Tab").
      const effective = (current == null ? field.default : current);
      for (const opt of field.options) {
        const value = (typeof opt === 'object') ? opt.value : opt;
        const text  = (typeof opt === 'object') ? opt.label : opt;

      sel.addEventListener('change', () => { snapshotState(); node.config[field.key] = sel.value; renderNodes(); });
      box.appendChild(sel);
    } else if (field.type === 'json') {
      const label = document.createElement('label'); label.textContent = field.label; box.appendChild(label);
      const ta = document.createElement('textarea');
      ta.value = current ? JSON.stringify(current, null, 2) : '';

function addField(box, labelText, type, value, onChange, placeholder, readonly) {
  const label = document.createElement('label'); label.textContent = labelText; box.appendChild(label);
  const input = document.createElement('input');
  input.type = type; input.value = value; if (placeholder) input.placeholder = placeholder;

// --- Serialize / load -----------------------------------------------------------
function toDefinition() {
  return {
    name: document.getElementById('pipeline-name').value || 'my-pipeline',
    description: '',
    version: 1,
    parameters: pipelineParams,
    nodes: nodes.map(n => ({ id: n.id, type: n.type, label: n.label, position: { x: n.x, y: n.y }, config: n.config })),
    edges: edges.map(e => ({ from: e.from, to: e.to, toPort: e.toPort }))
  };
}

function loadDefinition(def) {
  document.getElementById('pipeline-name').value = def.name || 'my-pipeline';
  nodes = (def.nodes || []).map(n => ({
    id: n.id, type: n.type, label: n.label || (NODE_TYPES[n.type] || {}).name || n.type,
    x: (n.position || {}).x || 50, y: (n.position || {}).y || 50, config: n.config || {}
  }));
  edges = (def.edges || []).map(e => ({ from: e.from, to: e.to, toPort: e.toPort || 'in' }));
  nextId = nodes.length + 1;
  sampleData = {};   // loaded samples are tied to the previous graph's node ids
  pipelineParams = (def.parameters || []).filter(p => p && p.name);
  selectedNode = null; selectedEdge = null; pendingFrom = null;
  renderAll(); renderProps();
  // The pipeline file stores no data, so previews/field pickers need the real source
  // files re-read. Offer to relink them by name in one step (browsers can't auto-read
  // a saved path; this is the one click that grants access). Per-node pickers also work.
  promptRelinkSources();
}

// Input nodes whose source file we could re-read by matching its filename.
function relinkableInputs() {
  return nodes.filter(n =>
    (n.type === 'input.csv' || n.type === 'input.json' || n.type === 'input.fixedwidth') &&
    baseName(n.config && n.config.path) &&
    !(sampleData[n.id] && sampleData[n.id].rows && sampleData[n.id].rows.length));
}
function baseName(p) {
  if (!p) return '';
  const b = String(p).split(/[\\/]/).pop();
  return /\$\{[A-Za-z0-9_]+\}/.test(b) ? '' : b;   // parameterized paths can't be matched by name
}
function promptRelinkSources() {
  const need = relinkableInputs();
  if (!need.length) return;
  const names = [...new Set(need.map(n => baseName(n.config.path)))];
  if (confirm('This pipeline references ' + names.length + ' source file' + (names.length > 1 ? 's' : '') +
      ' (' + names.join(', ') + ').\n\nLocate them now to refresh the column pickers and previews?')) {
    document.getElementById('file-relink').click();   // confirm() gives the gesture the picker needs
  } else {
    setStatus('Loaded. Use "Relink sources" (or a node\'s sample picker) when you want field pickers and previews.');
  }
}
// Re-read picked files into the matching input nodes by filename.
function relinkSources(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length) return;
  const byName = {};
  nodes.forEach(n => {
    if (n.type === 'input.csv' || n.type === 'input.json' || n.type === 'input.fixedwidth') {
      const b = baseName(n.config && n.config.path);
      if (b) (byName[b.toLowerCase()] = byName[b.toLowerCase()] || []).push(n);
    }
  });
  let matched = 0, unmatched = [];
  const jobs = [];
  files.forEach(file => {
    const targets = byName[file.name.toLowerCase()];
    if (!targets) { unmatched.push(file.name); return; }
    targets.forEach(n => { matched++; jobs.push(loadSampleIntoNode(n, file, true)); });
  });
  Promise.all(jobs).then(() => {
    renderAll(); renderProps();
    let msg = 'Relinked ' + matched + ' input' + (matched === 1 ? '' : 's') + '.';
    if (unmatched.length) msg += ' No node matched: ' + unmatched.join(', ') + '.';
    setStatus(msg);
  }).catch(err => setStatus('Relink failed: ' + err.message));
}

function download(filename, text) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// --- Code generation backends -----------------------------------------------
// A backend turns a pipeline definition into a finished, self-contained script.
// The PowerShell backend inlines the engine embedded above (id="ps-engine-source",
// kept in sync with src/PSPipeline/Core/PipelineFunctions.ps1), so the generated
// .ps1 has zero dependencies: no module, no internet, no install. That is the
// same artifact ConvertTo-PSPipelineScript produces. Adding a target (e.g. the
// POSIX sh + awk backend) means adding one more entry here.

function psEngineSource() {
  const el = document.getElementById('ps-engine-source');
  return (el ? el.textContent : '').replace(/^\n+/, '').replace(/\s+$/, '');
}

const BACKENDS = {
  powershell: {
    label: 'PowerShell 5.1+ (.ps1)',
    ext: '.ps1',
    available: true,
    filename() { return 'Invoke-DataPipeline.ps1'; },
    generate(def) {
      const engine = psEngineSource();
      if (!engine) throw new Error('The embedded PowerShell engine is missing. Run tools/Sync-DesignerEngine.ps1 to rebuild the designer.');
      if (typeof buildPowerShellScript !== 'function') throw new Error('The PowerShell script builder is missing. Run tools/Sync-DesignerEngine.ps1 to rebuild the designer.');
      return buildPowerShellScript(def, engine);
    }
  },
  shell: {
    label: 'POSIX sh + awk (.sh)',
    ext: '.sh',
    available: true,
    filename(def) { return (def.name || 'pipeline') + '.sh'; },
    generate(def) {
      const el = document.getElementById('sh-runtime-source');
      const runtime = (el ? el.textContent : '').replace(/^\n+/, '').replace(/\s+$/, '');
      if (!runtime) throw new Error('The embedded shell runtime is missing. Run tools/Sync-DesignerEngine.ps1 to rebuild the designer.');
      if (typeof generateShellScript !== 'function') throw new Error('The shell generator is missing. Run tools/Sync-DesignerEngine.ps1 to rebuild the designer.');
      return generateShellScript(def, runtime);
    }
  },
  mquery: {
    label: 'Power Query M (.pq) - for Excel / Power BI',
    ext: '.pq',
    available: true,
    filename(def) { return (def.name || 'pipeline') + '.pq'; },
    generate(def) {
      if (typeof generateMQuery !== 'function') throw new Error('The M generator is missing. Run tools/Sync-DesignerEngine.ps1 to rebuild the designer.');
      return generateMQuery(def);
    }
  }
};

function validate(def) {
  const issues = [];
  if (!def.nodes.length) issues.push('- The pipeline has no nodes.');
  for (const n of def.nodes) {
    const t = NODE_TYPES[n.type];
    if ((n.type.startsWith('input.') || n.type.startsWith('output.')) && !n.config.path)
      issues.push('- "' + n.label + '" has no file path.');
    if (n.type === 'input.fixedwidth' && !(n.config.columns && n.config.columns.length))
      issues.push('- "' + n.label + '" has no fixed-width columns defined.');
    for (const port of t.inputs) {
      if (!def.edges.some(e => e.to === n.id && (e.toPort || 'in') === port))
        issues.push('- "' + n.label + '" input port "' + port + '" is not connected.');
    }
  }
  return issues;
}

// --- Generate button + target picker ----------------------------------------
const modal = document.getElementById('modal');
let generated = null;

(function buildTargets() {
  const sel = document.getElementById('gen-target');
  for (const [id, backend] of Object.entries(BACKENDS)) {
    const o = document.createElement('option');
    o.value = id; o.textContent = backend.label;
    if (!backend.available) o.disabled = true;
    sel.appendChild(o);
  }
})();

document.getElementById('btn-generate').addEventListener('click', () => {
  const def = toDefinition();
  const issues = validate(def);
  if (issues.length) { alert('Fix these first:\n\n' + issues.join('\n')); return; }
  const backend = BACKENDS[document.getElementById('gen-target').value];
  if (!backend || !backend.available) { alert('That output target is not available yet.'); return; }
  let text;
  try { text = backend.generate(def); }
  catch (err) { alert('Could not generate: ' + err.message); return; }
  generated = { text, filename: backend.filename(def) };
  document.getElementById('modal-title').textContent = 'Generated script (' + backend.label + ')';
  document.getElementById('modal-pre').textContent = text;
  modal.classList.add('open');
});
document.getElementById('modal-close').addEventListener('click', () => modal.classList.remove('open'));
document.getElementById('modal-copy').addEventListener('click', () =>
  navigator.clipboard.writeText(generated.text).then(() => setStatus('Copied to clipboard.')));
document.getElementById('modal-download').addEventListener('click', () => download(generated.filename, generated.text));

document.getElementById('btn-zoom-in').addEventListener('click', () => zoomBy(1.2));
document.getElementById('btn-zoom-out').addEventListener('click', () => zoomBy(1 / 1.2));
document.getElementById('btn-zoom-fit').addEventListener('click', fitToView);
document.getElementById('preview-header').addEventListener('click', togglePreview);
applyZoom();
renderAll();
</script>
</body>
</html>
