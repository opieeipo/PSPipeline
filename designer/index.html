<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSPipeline Designer</title>
<!--
  PSPipeline Designer: a single-file, zero-install visual pipeline editor.
  No server, no build step, no network access: open this file in any modern
  browser, including on locked-down machines.

  Build a flow on the canvas, then:
    * "Save JSON" -- download the pipeline definition (pipeline.schema.json)
    * "Generate"  -- emit a self-contained script for the chosen target
                     (PowerShell today; POSIX sh + awk planned). No module needed.
-->
<style>
  :root {
    --bg: #1e2227; --panel: #262b33; --panel2: #2d333d; --line: #3a414d;
    --text: #d7dce3; --muted: #8b94a3; --accent: #4f9cf9;
    --input: #67c277; --transform: #4f9cf9; --output: #e0a14f;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 13px/1.45 "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--line); }
  #toolbar h1 { font-size: 14px; margin: 0 12px 0 0; color: var(--accent); }
  #toolbar input[type=text] { background: var(--panel2); border: 1px solid var(--line); color: var(--text); padding: 5px 8px; border-radius: 4px; width: 220px; }
  #toolbar button { background: var(--panel2); border: 1px solid var(--line); color: var(--text); padding: 5px 12px; border-radius: 4px; cursor: pointer; }
  #toolbar button:hover { border-color: var(--accent); }
  #toolbar select { background: var(--panel2); border: 1px solid var(--line); color: var(--text); padding: 5px 8px; border-radius: 4px; }
  #toolbar .spacer { flex: 1; }

  #main { display: flex; flex: 1; min-height: 0; }

  #palette { width: 185px; background: var(--panel); border-right: 1px solid var(--line); overflow-y: auto; padding: 8px; }
  #palette h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 12px 4px 6px; }
  .palette-item { padding: 7px 10px; margin: 3px 0; background: var(--panel2); border: 1px solid var(--line); border-left: 3px solid var(--muted); border-radius: 4px; cursor: grab; user-select: none; }
  .palette-item:hover { border-color: var(--accent); }
  .palette-item.cat-input { border-left-color: var(--input); }
  .palette-item.cat-transform { border-left-color: var(--transform); }
  .palette-item.cat-output { border-left-color: var(--output); }

  #canvas-area { flex: 1; position: relative; min-width: 0; }
  #canvas-wrap { position: absolute; inset: 0; overflow: auto; background-image: radial-gradient(var(--line) 1px, transparent 1px); background-size: 24px 24px; }
  #canvas { position: relative; width: 2400px; height: 1600px; }
  #edges { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #edges path { stroke: var(--muted); stroke-width: 2; fill: none; pointer-events: stroke; cursor: pointer; }
  #edges path.selected { stroke: var(--accent); stroke-width: 3; }
  #edges path.pending { stroke: var(--accent); stroke-dasharray: 6 4; }

  .node { position: absolute; width: 168px; background: var(--panel); border: 1px solid var(--line); border-radius: 6px; box-shadow: 0 3px 10px rgba(0,0,0,.35); user-select: none; }
  .node.selected { border-color: var(--accent); }
  .node .head { padding: 6px 10px; font-weight: 600; border-radius: 6px 6px 0 0; cursor: move; border-bottom: 1px solid var(--line); }
  .node.cat-input .head { background: rgba(103,194,119,.16); }
  .node.cat-transform .head { background: rgba(79,156,249,.16); }
  .node.cat-output .head { background: rgba(224,161,79,.16); }
  .node .body { padding: 6px 10px 8px; color: var(--muted); font-size: 11px; min-height: 26px; word-break: break-all; }
  .port { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: var(--panel2); border: 2px solid var(--muted); cursor: crosshair; }
  .port:hover, .port.armed { border-color: var(--accent); background: var(--accent); }
  .port.in { left: -7px; }
  .port.out { right: -7px; top: 50%; margin-top: -6px; }
  .port-label { position: absolute; left: 10px; font-size: 9px; color: var(--muted); margin-top: -7px; }

  #props { width: 280px; background: var(--panel); border-left: 1px solid var(--line); padding: 12px; overflow-y: auto; }
  #props h2 { font-size: 12px; margin: 0 0 10px; }
  #props label { display: block; font-size: 11px; color: var(--muted); margin: 10px 0 3px; }
  #props input, #props select, #props textarea { width: 100%; background: var(--panel2); border: 1px solid var(--line); color: var(--text); padding: 5px 7px; border-radius: 4px; font: inherit; }
  #props input.readonly { color: var(--muted); background: #20242b; cursor: default; }
  #props textarea { min-height: 84px; font-family: ui-monospace, Consolas, monospace; font-size: 11px; }
  #props .hint { font-size: 10px; color: var(--muted); margin-top: 2px; }
  #props button.danger { margin-top: 14px; width: 100%; background: none; border: 1px solid #b05050; color: #d98080; padding: 6px; border-radius: 4px; cursor: pointer; }

  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; }
  #modal.open { display: flex; }
  #modal .box { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; width: min(760px, 90vw); max-height: 85vh; display: flex; flex-direction: column; padding: 16px; }
  #modal pre { flex: 1; overflow: auto; background: var(--bg); border: 1px solid var(--line); border-radius: 4px; padding: 10px; font-size: 11px; }
  #modal .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
  #modal button { background: var(--panel2); border: 1px solid var(--line); color: var(--text); padding: 6px 14px; border-radius: 4px; cursor: pointer; }

  #props .builder-row { display: flex; gap: 4px; align-items: center; margin: 4px 0; }
  #props .builder-row > select, #props .builder-row > input { width: auto; flex: 1 1 auto; min-width: 40px; }
  #props .builder-rm { flex: 0 0 auto; width: 24px; background: none; border: 1px solid #b05050; color: #d98080; border-radius: 4px; cursor: pointer; padding: 2px 0; }
  #props .builder-add { margin-top: 4px; background: var(--panel2); border: 1px solid var(--line); color: var(--text); padding: 4px 10px; border-radius: 4px; cursor: pointer; }
  #props .chk { display: flex; flex-direction: column; gap: 2px; max-height: 150px; overflow: auto; border: 1px solid var(--line); border-radius: 4px; padding: 4px 6px; background: var(--panel2); }
  #props .chkrow { display: flex; align-items: center; font-size: 12px; color: var(--text); margin: 0; }
  #props .chkrow input { width: auto; margin-right: 6px; }
  #props .preview { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 8px; }
  #props .preview .cols { font-size: 11px; color: var(--muted); margin: 0 0 6px; word-break: break-word; }
  #props .preview table { border-collapse: collapse; font-size: 10px; width: 100%; table-layout: fixed; }
  #props .preview th, #props .preview td { border: 1px solid var(--line); padding: 2px 4px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #props .preview th { color: var(--accent); }

  #preview-panel { flex: 0 0 auto; background: var(--panel); border-top: 1px solid var(--line); display: flex; flex-direction: column; }
  #preview-header { padding: 5px 12px; cursor: pointer; font-size: 12px; color: var(--text); user-select: none; }
  #preview-panel:not(.collapsed) #preview-header { border-bottom: 1px solid var(--line); }
  #preview-toggle { color: var(--accent); display: inline-block; width: 12px; }
  #preview-body { height: 200px; overflow: auto; padding: 8px 12px; }
  #preview-panel.collapsed #preview-body { display: none; }
  #preview-panel .preview-head { font-size: 12px; color: var(--text); margin-bottom: 6px; }
  #preview-panel .preview-cols { color: var(--muted); }
  #preview-panel table { border-collapse: collapse; font-size: 11px; }
  #preview-panel th, #preview-panel td { border: 1px solid var(--line); padding: 3px 8px; text-align: left; white-space: nowrap; max-width: 280px; overflow: hidden; text-overflow: ellipsis; }
  #preview-panel th { color: var(--accent); position: sticky; top: 0; background: var(--panel); }
  #preview-panel .preview-empty, #preview-panel .preview-note { color: var(--muted); font-size: 11px; margin-top: 4px; }

  .palette-item { display: flex; align-items: center; gap: 8px; }
  .pi-icon { flex: 0 0 auto; width: 18px; text-align: center; font-size: 15px; }
  #palette .pal-head { display: flex; justify-content: flex-end; margin-bottom: 6px; }
  #btn-palette-toggle { background: var(--panel2); border: 1px solid var(--line); color: var(--muted); font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer; }
  #palette.collapse { width: 52px; padding: 8px 4px; }
  #palette.collapse h2 { display: none; }
  #palette.collapse .pi-label { display: none; }
  #palette.collapse .palette-item { justify-content: center; padding: 8px 0; }
  #palette.collapse .pal-head { justify-content: center; }
  #palette.compress { display: flex; flex-wrap: wrap; align-content: flex-start; gap: 4px; }
  #palette.compress .pal-head { flex: 0 0 100%; }
  #palette.compress h2 { flex: 0 0 100%; margin: 6px 4px 2px; }
  #palette.compress .palette-item { width: 38px; height: 34px; padding: 0; justify-content: center; margin: 0; }
  #palette.compress .pi-label { display: none; }
  .node .head { display: flex; align-items: center; gap: 6px; cursor: move; }
  .node .head .nh-icon { flex: 0 0 auto; font-size: 13px; }
  .node .body { cursor: move; }
  #zoom-overlay { position: absolute; right: 14px; bottom: 14px; z-index: 10; display: flex; align-items: center; gap: 4px; background: rgba(38,43,51,.92); border: 1px solid var(--line); border-radius: 6px; padding: 4px 6px; box-shadow: 0 2px 8px rgba(0,0,0,.4); }
  #zoom-overlay button { background: var(--panel2); border: 1px solid var(--line); color: var(--text); padding: 4px 9px; border-radius: 4px; cursor: pointer; }
  #zoom-overlay button:hover { border-color: var(--accent); }
  #zoom-overlay #zoom-label { font-size: 11px; color: var(--muted); min-width: 40px; text-align: center; }
  .marquee { position: absolute; z-index: 5; border: 1px solid var(--accent); background: rgba(79,156,249,.12); pointer-events: none; }

  #status { padding: 4px 12px; font-size: 11px; color: var(--muted); background: var(--panel); border-top: 1px solid var(--line); }
</style>
</head>
<body>

<div id="toolbar">
  <h1>PSPipeline Designer</h1>
  <input type="text" id="pipeline-name" value="my-pipeline" title="Pipeline name">
  <button id="btn-new">New</button>
  <button id="btn-open">Open JSON</button>
  <button id="btn-save">Save JSON</button>
  <button id="btn-relink" title="Re-read the source files referenced by the loaded pipeline, matched by filename">Relink sources</button>
  <div class="spacer"></div>
  <select id="gen-target" title="Output target"></select>
  <button id="btn-generate">⚡ Generate</button>
  <input type="file" id="file-open" accept=".json" hidden>
  <input type="file" id="file-relink" accept=".csv,.tsv,.txt,.json" multiple hidden>
</div>

<div id="main">
  <div id="palette"></div>
  <div id="canvas-area">
    <div id="canvas-wrap">
      <div id="canvas">
        <svg id="edges"></svg>
      </div>
    </div>
    <div id="zoom-overlay">
      <button id="btn-zoom-out" title="Zoom out">-</button>
      <span id="zoom-label">100%</span>
      <button id="btn-zoom-in" title="Zoom in">+</button>
      <button id="btn-zoom-fit" title="Fit to view">Fit</button>
    </div>
  </div>
  <div id="props"><h2>Properties</h2><div id="props-body"><p class="hint">Select a node to edit it. Tip: drag a .csv / .tsv / .txt / .json file onto the canvas to create an input node.</p></div></div>
</div>

<div id="preview-panel" class="collapsed">
  <div id="preview-header"><span id="preview-toggle">▸</span> <span id="preview-title">Preview</span></div>
  <div id="preview-body"></div>
</div>

<div id="status">Ready — drag nodes from the palette, click an output port then an input port to connect.</div>

<div id="modal">
  <div class="box">
    <h2 id="modal-title">Generated PowerShell</h2>
    <pre id="modal-pre"></pre>
    <div class="row">
      <button id="modal-copy">Copy</button>
      <button id="modal-download">Download</button>
      <button id="modal-close">Close</button>
    </div>
  </div>
</div>

<!-- Embedded PowerShell engine source, kept in sync with
     src/PSPipeline/Core/PipelineFunctions.ps1 via tools/Sync-DesignerEngine.ps1.
     The in-browser PowerShell backend inlines this verbatim, so the generated
     .ps1 needs no module. Do not edit by hand; rerun the sync script. -->
<script type="text/plain" id="ps-engine-source">
#region PSPipeline core functions
# ---------------------------------------------------------------------------
# This file is shared between the PSPipeline module AND every generated
# standalone script (ConvertTo-PSPipelineScript inlines it verbatim).
#
# Hard constraints for everything in this file:
#   * Windows PowerShell 5.1 compatible (no PS7-only syntax or parameters)
#   * Built-in cmdlets only -- no required external modules of any kind
#   * Constrained Language Mode friendly: no Add-Type, no Invoke-Expression,
#     no [scriptblock]::Create on user-supplied strings
# ---------------------------------------------------------------------------

# --- Environment awareness --------------------------------------------------

$script:PipelineEnvironment = $null

function Get-PipelineEnvironment {
    <#
    .SYNOPSIS
        Detects the capabilities of the current host so pipeline nodes can
        adapt to the environment they are running in. Result is cached.
    .OUTPUTS
        PSCustomObject with version, edition, OS, language mode and
        text-encoding behavior information.
    #>
    param([switch]$Refresh)
    if ($script:PipelineEnvironment -and -not $Refresh) { return $script:PipelineEnvironment }

    $psVersion = $PSVersionTable.PSVersion
    $edition   = if ($PSVersionTable.PSEdition) { [string]$PSVersionTable.PSEdition } else { 'Desktop' }

    # $IsWindows does not exist in Windows PowerShell 5.1 (its absence means Windows).
    $isWindowsHost = if ($null -eq (Get-Variable -Name IsWindows -ErrorAction SilentlyContinue)) { $true } else { [bool]$IsWindows }

    $languageMode  = [string]$ExecutionContext.SessionState.LanguageMode
    $isConstrained = $languageMode -ne 'FullLanguage'

    $script:PipelineEnvironment = [pscustomobject]@{
        PSVersion      = $psVersion
        PSEdition      = $edition
        IsWindows      = $isWindowsHost
        LanguageMode   = $languageMode
        IsConstrained  = $isConstrained
        # Windows PowerShell 5.1 writes a UTF-8 BOM with -Encoding UTF8; PowerShell 6+
        # does not unless asked. Used to keep delimited-text output byte-identical
        # (BOM included, so spreadsheets open it correctly) on every host.
        Utf8WritesBom  = $psVersion.Major -le 5
    }
    $script:PipelineEnvironment
}

function Assert-PipelineHost {
    if ($PSVersionTable.PSVersion -lt [version]'5.1') {
        throw "PSPipeline requires Windows PowerShell 5.1 or later (detected $($PSVersionTable.PSVersion))."
    }
    $environment = Get-PipelineEnvironment
    Write-Verbose ("PSPipeline host: PowerShell {0} ({1}), {2}, LanguageMode={3}" -f `
        $environment.PSVersion, $environment.PSEdition,
        $(if ($environment.IsWindows) { 'Windows' } else { 'Non-Windows' }),
        $environment.LanguageMode)
}

# --- Input nodes -----------------------------------------------------------

function Import-PipelineCsv {
    param(
        [Parameter(Mandatory)][string]$Path,
        [string]$Delimiter = ','
    )
    @(Import-Csv -Path $Path -Delimiter $Delimiter)
}

function Import-PipelineJson {
    param([Parameter(Mandatory)][string]$Path)
    $data = Get-Content -Path $Path -Raw | ConvertFrom-Json
    @($data)
}

function Import-PipelineFixedWidth {
    # Reads a fixed-width / flat text file where each column occupies a fixed
    # range of characters on every line. $Columns is an array of objects with
    # .name, .start (1-based character position) and .length. Values are trimmed.
    # Built-in only (Substring); CLM-safe.
    param(
        [Parameter(Mandatory)][string]$Path,
        [Parameter(Mandatory)][object[]]$Columns,
        [int]$SkipLines = 0
    )
    $lines = @(Get-Content -Path $Path)
    if ($SkipLines -gt 0) {
        $lines = if ($lines.Count -gt $SkipLines) { @($lines[$SkipLines..($lines.Count - 1)]) } else { @() }
    }
    @(foreach ($line in $lines) {
        if ($null -eq $line -or $line.Length -eq 0) { continue }
        $out = [ordered]@{}
        foreach ($col in $Columns) {
            $start = [int]$col.start - 1
            $length = [int]$col.length
            if ($start -lt 0) { $start = 0 }
            $value = ''
            if ($start -lt $line.Length) {
                $take = $length
                if ($take -gt ($line.Length - $start)) { $take = $line.Length - $start }
                $value = $line.Substring($start, $take)
            }
            $out[[string]$col.name] = $value.Trim()
        }
        [pscustomobject]$out
    })
}

# --- Column transforms -----------------------------------------------------

function Select-PipelineColumn {
    param([object[]]$Data, [string[]]$Columns)
    @($Data | Select-Object -Property $Columns)
}

function Remove-PipelineColumn {
    param([object[]]$Data, [string[]]$Columns)
    @($Data | Select-Object -Property * -ExcludeProperty $Columns)
}

function Rename-PipelineColumn {
    # $Renames is an array of objects with .from and .to (shape matches the JSON definition)
    param([object[]]$Data, [object[]]$Renames)
    $map = @{}
    foreach ($r in $Renames) { $map[[string]$r.from] = [string]$r.to }
    @(foreach ($row in $Data) {
        $out = [ordered]@{}
        foreach ($prop in $row.PSObject.Properties) {
            $name = if ($map.ContainsKey($prop.Name)) { $map[$prop.Name] } else { $prop.Name }
            $out[$name] = $prop.Value
        }
        [pscustomobject]$out
    })
}

function Add-PipelineColumn {
    # Adds a derived column from a template string with {ColumnName} placeholders,
    # e.g. -Name FullName -Template '{FirstName} {LastName}'.
    # Deliberately not an expression evaluator: no code execution, CLM-safe.
    param(
        [object[]]$Data,
        [Parameter(Mandatory)][string]$Name,
        [Parameter(Mandatory)][string]$Template
    )
    @(foreach ($row in $Data) {
        $out = [ordered]@{}
        $value = $Template
        foreach ($prop in $row.PSObject.Properties) {
            $out[$prop.Name] = $prop.Value
            $value = $value.Replace('{' + $prop.Name + '}', [string]$prop.Value)
        }
        $out[$Name] = $value
        [pscustomobject]$out
    })
}

# --- Row transforms --------------------------------------------------------

function Test-PipelineCondition {
    # $Condition has .column, .operator, .value
    param($Row, $Condition)
    $actual = $Row.($Condition.column)
    $expected = $Condition.value

    # Compare numerically when both sides parse as numbers, otherwise as strings.
    $actualNum = 0.0; $expectedNum = 0.0
    $isNumeric = [double]::TryParse([string]$actual, [ref]$actualNum) -and
                 [double]::TryParse([string]$expected, [ref]$expectedNum)

    switch ([string]$Condition.operator) {
        'eq'         { if ($isNumeric) { $actualNum -eq $expectedNum } else { [string]$actual -eq [string]$expected } }
        'ne'         { if ($isNumeric) { $actualNum -ne $expectedNum } else { [string]$actual -ne [string]$expected } }
        'gt'         { if ($isNumeric) { $actualNum -gt $expectedNum } else { [string]$actual -gt [string]$expected } }
        'ge'         { if ($isNumeric) { $actualNum -ge $expectedNum } else { [string]$actual -ge [string]$expected } }
        'lt'         { if ($isNumeric) { $actualNum -lt $expectedNum } else { [string]$actual -lt [string]$expected } }
        'le'         { if ($isNumeric) { $actualNum -le $expectedNum } else { [string]$actual -le [string]$expected } }
        'contains'   { [string]$actual -like ('*' + [string]$expected + '*') }
        'startswith' { [string]$actual -like ([string]$expected + '*') }
        'endswith'   { [string]$actual -like ('*' + [string]$expected) }
        'isempty'    { $null -eq $actual -or [string]$actual -eq '' }
        'isnotempty' { $null -ne $actual -and [string]$actual -ne '' }
        default      { throw "Unknown filter operator '$($Condition.operator)'." }
    }
}

function Where-PipelineRow {
    param(
        [object[]]$Data,
        [object[]]$Conditions,
        [ValidateSet('All', 'Any')][string]$Match = 'All'
    )
    @(foreach ($row in $Data) {
        $passes = @(foreach ($c in $Conditions) { Test-PipelineCondition -Row $row -Condition $c })
        $keep = if ($Match -eq 'All') { $passes -notcontains $false } else { $passes -contains $true }
        if ($keep) { $row }
    })
}

function Sort-PipelineData {
    # $SortBy is an array of objects with .column and optional .descending
    param([object[]]$Data, [object[]]$SortBy)
    $properties = @(foreach ($s in $SortBy) {
        @{ Expression = [string]$s.column; Descending = [bool]$s.descending }
    })
    @($Data | Sort-Object -Property $properties)
}

function Select-PipelineDistinct {
    param([object[]]$Data, [string[]]$Columns)
    if ($Columns -and $Columns.Count -gt 0) {
        return @($Data | Sort-Object -Property $Columns -Unique)
    }
    @($Data | Sort-Object -Property * -Unique)
}

# --- Row operations --------------------------------------------------------

function Limit-PipelineRow {
    # Mode: Top|Bottom|Range. Top/Bottom use Count; Range uses Start (1-based) + Count.
    param([object[]]$Data, [string]$Mode = 'Top', [int]$Count = 10, [int]$Start = 1)
    $rows = @($Data); $n = $rows.Count
    if ($n -eq 0 -or $Count -le 0) { return @() }
    switch ([string]$Mode) {
        'Bottom' { if ($Count -ge $n) { @($rows) } else { @($rows[($n - $Count)..($n - 1)]) } }
        'Range'  {
            $s = $Start - 1; if ($s -lt 0) { $s = 0 }
            if ($s -ge $n) { return @() }
            $e = $s + $Count - 1; if ($e -ge $n) { $e = $n - 1 }
            @($rows[$s..$e])
        }
        default  { if ($Count -ge $n) { @($rows) } else { @($rows[0..($Count - 1)]) } }
    }
}

function Add-PipelineIndex {
    param([object[]]$Data, [string]$Name = 'Index', [int]$Start = 1)
    $i = $Start
    @(foreach ($row in $Data) {
        $out = [ordered]@{}
        foreach ($p in $row.PSObject.Properties) { $out[$p.Name] = $p.Value }
        $out[$Name] = $i; $i++
        [pscustomobject]$out
    })
}

function Edit-PipelineValue {
    # Replace values in $Column. WholeCell: case-insensitive whole-cell match. Otherwise literal substring replace.
    param([object[]]$Data, [Parameter(Mandatory)][string]$Column, [string]$Find = '', [string]$ReplaceWith = '', [switch]$WholeCell)
    @(foreach ($row in $Data) {
        $out = [ordered]@{}
        foreach ($p in $row.PSObject.Properties) {
            if ($p.Name -eq $Column) {
                $val = [string]$p.Value
                if ($WholeCell) { if ($val -eq $Find) { $val = $ReplaceWith } }
                elseif ($Find -ne '') { $val = $val.Replace($Find, $ReplaceWith) }
                $out[$p.Name] = $val
            }
            else { $out[$p.Name] = $p.Value }
        }
        [pscustomobject]$out
    })
}

function Set-PipelineFill {
    # Fill empty cells in $Columns with the last (Down) or next (Up) non-empty value.
    param([object[]]$Data, [string[]]$Columns, [string]$Direction = 'Down')
    $tables = @(foreach ($row in $Data) {
        $o = [ordered]@{}
        foreach ($p in $row.PSObject.Properties) { $o[$p.Name] = $p.Value }
        $o
    })
    if ($tables.Count -eq 0) { return @() }
    foreach ($col in $Columns) {
        $last = $null
        if ($Direction -eq 'Up') {
            for ($i = $tables.Count - 1; $i -ge 0; $i--) {
                if ([string]$tables[$i][$col] -ne '') { $last = $tables[$i][$col] }
                elseif ($null -ne $last) { $tables[$i][$col] = $last }
            }
        }
        else {
            for ($i = 0; $i -lt $tables.Count; $i++) {
                if ([string]$tables[$i][$col] -ne '') { $last = $tables[$i][$col] }
                elseif ($null -ne $last) { $tables[$i][$col] = $last }
            }
        }
    }
    @(foreach ($t in $tables) { [pscustomobject]$t })
}

function Add-PipelineConditional {
    # Adds $Name: the Result of the first matching rule, else $Else. Result/Else are
    # {Column} templates (no code eval, CLM-safe). Rule: { column, operator, value, result }.
    param([object[]]$Data, [Parameter(Mandatory)][string]$Name, [object[]]$Rules, [string]$Else = '')
    @(foreach ($row in $Data) {
        $picked = $Else
        foreach ($rule in $Rules) {
            $cond = [pscustomobject]@{ column = $rule.column; operator = $rule.operator; value = $rule.value }
            if (Test-PipelineCondition -Row $row -Condition $cond) { $picked = [string]$rule.result; break }
        }
        $value = $picked
        foreach ($p in $row.PSObject.Properties) { $value = $value.Replace('{' + $p.Name + '}', [string]$p.Value) }
        $out = [ordered]@{}
        foreach ($p in $row.PSObject.Properties) { $out[$p.Name] = $p.Value }
        $out[$Name] = $value
        [pscustomobject]$out
    })
}

function Edit-PipelineText {
    # Single-column text op. Op: trim|lower|upper|title|before|after|between.
    # before/after/between extract relative to Find (and Find2 for between).
    # If As is set, the result goes to a new column; otherwise it replaces Column.
    param([object[]]$Data, [Parameter(Mandatory)][string]$Column, [string]$Op = 'trim',
          [string]$Find = '', [string]$Find2 = '', [string]$As = '')
    @(foreach ($row in $Data) {
        $src = [string]$row.$Column
        $val = switch ([string]$Op) {
            'lower' { $src.ToLower() }
            'upper' { $src.ToUpper() }
            'title' {
                $parts = $src.ToLower() -split ' '
                ($parts | ForEach-Object { if ($_.Length -gt 0) { $_.Substring(0, 1).ToUpper() + $_.Substring(1) } else { $_ } }) -join ' '
            }
            'before' { $i = $src.IndexOf($Find); if ($Find -ne '' -and $i -ge 0) { $src.Substring(0, $i) } else { '' } }
            'after'  { $i = $src.IndexOf($Find); if ($Find -ne '' -and $i -ge 0) { $src.Substring($i + $Find.Length) } else { '' } }
            'between' {
                $i = $src.IndexOf($Find)
                if ($Find -ne '' -and $i -ge 0) {
                    $start = $i + $Find.Length
                    $j = if ($Find2 -ne '') { $src.IndexOf($Find2, $start) } else { -1 }
                    if ($j -ge 0) { $src.Substring($start, $j - $start) } else { $src.Substring($start) }
                } else { '' }
            }
            default { $src.Trim() }
        }
        $out = [ordered]@{}
        foreach ($p in $row.PSObject.Properties) {
            if (-not $As -and $p.Name -eq $Column) { $out[$p.Name] = $val } else { $out[$p.Name] = $p.Value }
        }
        if ($As) { $out[$As] = $val }
        [pscustomobject]$out
    })
}

function Union-PipelineData {
    # Stacks the rows of every input table. Output columns are the union of all
    # input columns in first-appearance order; cells absent from a row are empty.
    param([object[]]$Tables)
    $cols = New-Object System.Collections.ArrayList
    $seen = @{}
    foreach ($t in $Tables) {
        $rows = @($t)
        if ($rows.Count -gt 0) {
            foreach ($p in $rows[0].PSObject.Properties) {
                if (-not $seen.ContainsKey($p.Name)) { $seen[$p.Name] = $true; [void]$cols.Add($p.Name) }
            }
        }
    }
    @(foreach ($t in $Tables) {
        foreach ($row in @($t)) {
            $out = [ordered]@{}
            foreach ($c in $cols) {
                $prop = $row.PSObject.Properties[$c]
                $out[$c] = if ($prop) { $prop.Value } else { '' }
            }
            [pscustomobject]$out
        }
    })
}

function Convert-PipelineUnpivot {
    # Wide -> long. Keeps $Keep columns; melts every other column into two columns:
    # $AttributeName (the source column name) and $ValueName (its cell value).
    param([object[]]$Data, [string[]]$Keep, [string]$AttributeName = 'Attribute', [string]$ValueName = 'Value')
    $rows = @($Data); if ($rows.Count -eq 0) { return @() }
    $valCols = @(foreach ($p in $rows[0].PSObject.Properties.Name) { if ($Keep -notcontains $p) { $p } })
    @(foreach ($row in $rows) {
        foreach ($vc in $valCols) {
            $out = [ordered]@{}
            foreach ($k in $Keep) { $out[$k] = $row.$k }
            $out[$AttributeName] = $vc
            $out[$ValueName] = $row.$vc
            [pscustomobject]$out
        }
    })
}

function Convert-PipelinePivot {
    # Long -> wide. Groups by $GroupBy; the distinct values of $PivotColumn become
    # columns whose cells are the $Aggregate (First|Sum|Count) of $ValueColumn.
    param([object[]]$Data, [string[]]$GroupBy, [Parameter(Mandatory)][string]$PivotColumn, [string]$ValueColumn, [string]$Aggregate = 'First')
    $rows = @($Data)
    $pivotVals = New-Object System.Collections.ArrayList
    $pseen = @{}
    foreach ($row in $rows) { $pv = [string]$row.$PivotColumn; if (-not $pseen.ContainsKey($pv)) { $pseen[$pv] = $true; [void]$pivotVals.Add($pv) } }
    $order = New-Object System.Collections.ArrayList
    $groups = @{}
    foreach ($row in $rows) {
        $key = (@(foreach ($g in $GroupBy) { [string]$row.$g }) -join [char]31)
        if (-not $groups.ContainsKey($key)) {
            $groups[$key] = [pscustomobject]@{ KeyVals = @(foreach ($g in $GroupBy) { $row.$g }); Rows = (New-Object System.Collections.ArrayList) }
            [void]$order.Add($key)
        }
        [void]$groups[$key].Rows.Add($row)
    }
    @(foreach ($key in $order) {
        $grp = $groups[$key]
        $out = [ordered]@{}
        for ($gi = 0; $gi -lt $GroupBy.Count; $gi++) { $out[$GroupBy[$gi]] = $grp.KeyVals[$gi] }
        foreach ($pv in $pivotVals) {
            $matching = @($grp.Rows | Where-Object { [string]$_.$PivotColumn -eq $pv })
            $out[$pv] = switch ([string]$Aggregate) {
                'Count' { $matching.Count }
                'Sum' {
                    $nums = @(foreach ($m in $matching) { $n = 0.0; if ([double]::TryParse([string]$m.$ValueColumn, [ref]$n)) { $n } })
                    ($nums | Measure-Object -Sum).Sum
                }
                default { if ($matching.Count -gt 0) { $matching[0].$ValueColumn } else { '' } }
            }
        }
        [pscustomobject]$out
    })
}

# --- Date / type ------------------------------------------------------------

function Get-PipelineDateParts {
    # Parse an ISO-ish date (yyyy<sep>MM<sep>dd, any non-digit separators, optional
    # trailing time) into integer Y/M/D. Returns $null if it does not match.
    param([string]$Value)
    if ($Value -match '^\s*(\d{4})\D+(\d{1,2})\D+(\d{1,2})') {
        [pscustomobject]@{ Y = [int]$matches[1]; M = [int]$matches[2]; D = [int]$matches[3] }
    } else { $null }
}

function Get-PipelineJdn {
    # Julian Day Number from a proleptic Gregorian date. Pure integer math so it is
    # identical across PowerShell, awk, JavaScript, and M.
    param([int]$Y, [int]$M, [int]$D)
    $a = [int][math]::Floor((14 - $M) / 12)
    $y2 = $Y + 4800 - $a
    $m2 = $M + 12 * $a - 3
    [int]($D + [int][math]::Floor((153 * $m2 + 2) / 5) + 365 * $y2 + [int][math]::Floor($y2 / 4) - [int][math]::Floor($y2 / 100) + [int][math]::Floor($y2 / 400) - 32045)
}

function Format-PipelineDate {
    param([int]$Y, [int]$M, [int]$D, [string]$Format)
    $yyyy = '{0:D4}' -f $Y; $MM = '{0:D2}' -f $M; $dd = '{0:D2}' -f $D
    switch ($Format) {
        'yyyy/MM/dd' { "$yyyy/$MM/$dd" }
        'MM/dd/yyyy' { "$MM/$dd/$yyyy" }
        'dd/MM/yyyy' { "$dd/$MM/$yyyy" }
        'yyyyMMdd'   { "$yyyy$MM$dd" }
        'yyyy-MM'    { "$yyyy-$MM" }
        default      { "$yyyy-$MM-$dd" }
    }
}

function Convert-PipelineDate {
    # Extract a component, reformat, or take a day-difference from an ISO-ish date column.
    param([object[]]$Data, [string]$Column, [string]$Op, [string]$Column2, [string]$Format, [string]$As)
    $target = if ($As) { $As } else { $Column }
    @(foreach ($row in $Data) {
        $p = Get-PipelineDateParts ([string]$row.$Column)
        $result = if ($null -eq $p) { '' } else {
            switch ($Op) {
                'year'    { $p.Y }
                'month'   { $p.M }
                'day'     { $p.D }
                'weekday' { ((Get-PipelineJdn $p.Y $p.M $p.D) % 7) + 1 }  # ISO: Monday=1 .. Sunday=7
                'format'  { Format-PipelineDate $p.Y $p.M $p.D $Format }
                'diffdays' {
                    $p2 = Get-PipelineDateParts ([string]$row.$Column2)
                    if ($null -eq $p2) { '' } else { (Get-PipelineJdn $p.Y $p.M $p.D) - (Get-PipelineJdn $p2.Y $p2.M $p2.D) }
                }
                default { '' }
            }
        }
        $out = [ordered]@{}
        foreach ($prop in $row.PSObject.Properties) { $out[$prop.Name] = $prop.Value }
        $out[$target] = $result
        [pscustomobject]$out
    })
}

function Convert-PipelineCast {
    # Light type normalization (mostly meaningful for the M export's typing).
    param([object[]]$Data, [string]$Column, [string]$To)
    @(foreach ($row in $Data) {
        $v = [string]$row.$Column
        $n = 0.0
        $new = switch ($To) {
            'number'  { if ([double]::TryParse($v, [ref]$n)) { $n } else { $v } }
            'integer' { if ([double]::TryParse($v, [ref]$n)) { [int][math]::Truncate($n) } else { $v } }
            default   { $v }
        }
        $out = [ordered]@{}
        foreach ($prop in $row.PSObject.Properties) { $out[$prop.Name] = $prop.Value }
        $out[$Column] = $new
        [pscustomobject]$out
    })
}

function Select-PipelineColumnOrder {
    # Reorder columns without dropping any. Listed columns come first in the given
    # order; any input columns not listed are appended in their original order.
    param([object[]]$Data, [string[]]$Order)
    $rows = @($Data); if ($rows.Count -eq 0) { return @() }
    $all = @($rows[0].PSObject.Properties.Name)
    $final = New-Object System.Collections.ArrayList
    foreach ($c in $Order) { if (($all -contains $c) -and ($final -notcontains $c)) { [void]$final.Add($c) } }
    foreach ($c in $all) { if ($final -notcontains $c) { [void]$final.Add($c) } }
    @(foreach ($row in $rows) {
        $out = [ordered]@{}
        foreach ($c in $final) { $out[$c] = $row.$c }
        [pscustomobject]$out
    })
}

# --- Join ------------------------------------------------------------------

function Merge-PipelineRow {
    # Combines one left row and one right row into a single flat row.
    # Right-side columns that collide with left-side names get a 'Right_' prefix.
    param($LeftRow, $RightRow, [string[]]$LeftColumns, [string[]]$RightColumns)
    $out = [ordered]@{}
    foreach ($c in $LeftColumns) {
        $out[$c] = if ($null -ne $LeftRow) { $LeftRow.$c } else { $null }
    }
    foreach ($c in $RightColumns) {
        $name = if ($out.Contains($c)) { 'Right_' + $c } else { $c }
        $out[$name] = if ($null -ne $RightRow) { $RightRow.$c } else { $null }
    }
    [pscustomobject]$out
}

function Join-PipelineData {
    param(
        [object[]]$Left,
        [object[]]$Right,
        [Parameter(Mandatory)][string]$LeftKey,
        [Parameter(Mandatory)][string]$RightKey,
        [ValidateSet('Inner', 'Left', 'Right', 'Full')][string]$JoinType = 'Inner'
    )
    $leftColumns  = if ($Left.Count)  { @($Left[0].PSObject.Properties.Name) }  else { @() }
    $rightColumns = if ($Right.Count) { @($Right[0].PSObject.Properties.Name) } else { @() }

    # Index the right side by key for O(n + m) matching.
    $rightIndex = @{}
    foreach ($row in $Right) {
        $key = [string]$row.$RightKey
        if (-not $rightIndex.ContainsKey($key)) {
            $rightIndex[$key] = New-Object System.Collections.ArrayList
        }
        [void]$rightIndex[$key].Add($row)
    }

    $results = New-Object System.Collections.ArrayList
    $matchedKeys = @{}
    foreach ($leftRow in $Left) {
        $key = [string]$leftRow.$LeftKey
        if ($rightIndex.ContainsKey($key)) {
            $matchedKeys[$key] = $true
            foreach ($rightRow in $rightIndex[$key]) {
                [void]$results.Add((Merge-PipelineRow $leftRow $rightRow $leftColumns $rightColumns))
            }
        }
        elseif ($JoinType -eq 'Left' -or $JoinType -eq 'Full') {
            [void]$results.Add((Merge-PipelineRow $leftRow $null $leftColumns $rightColumns))
        }
    }
    if ($JoinType -eq 'Right' -or $JoinType -eq 'Full') {
        foreach ($rightRow in $Right) {
            if (-not $matchedKeys.ContainsKey([string]$rightRow.$RightKey)) {
                [void]$results.Add((Merge-PipelineRow $null $rightRow $leftColumns $rightColumns))
            }
        }
    }
    @($results)
}

# --- Aggregate -------------------------------------------------------------

function Group-PipelineData {
    # $Aggregations is an array of objects with .column, .function and optional .as
    # Functions: Count, Sum, Average, Min, Max, First, Median, CountDistinct, StringJoin
    param(
        [object[]]$Data,
        [string[]]$GroupBy,
        [object[]]$Aggregations
    )
    @(foreach ($group in ($Data | Group-Object -Property $GroupBy)) {
        $out = [ordered]@{}
        $first = $group.Group[0]
        foreach ($col in $GroupBy) { $out[$col] = $first.$col }
        foreach ($agg in $Aggregations) {
            $name = if ($agg.as) { [string]$agg.as } else { '{0}_{1}' -f $agg.function, $agg.column }
            $out[$name] = switch ([string]$agg.function) {
                'Count' { $group.Count }
                'First' { $first.($agg.column) }
                'CountDistinct' {
                    $seen = @{}
                    foreach ($row in $group.Group) { $seen[[string]$row.($agg.column)] = $true }
                    $seen.Count
                }
                'StringJoin' { (@(foreach ($row in $group.Group) { [string]$row.($agg.column) })) -join ', ' }
                default {
                    # Numeric aggregations: ignore rows where the value doesn't parse
                    # (e.g. nulls introduced by an outer join).
                    $numbers = @(foreach ($row in $group.Group) {
                        $n = 0.0
                        if ([double]::TryParse([string]$row.($agg.column), [ref]$n)) { $n }
                    })
                    switch ([string]$agg.function) {
                        'Sum'     { ($numbers | Measure-Object -Sum).Sum }
                        'Average' { ($numbers | Measure-Object -Average).Average }
                        'Min'     { ($numbers | Measure-Object -Minimum).Minimum }
                        'Max'     { ($numbers | Measure-Object -Maximum).Maximum }
                        'Median'  {
                            $sorted = @($numbers | Sort-Object)
                            $c = $sorted.Count
                            if ($c -eq 0) { '' }
                            elseif ($c % 2 -eq 1) { $sorted[[int](($c - 1) / 2)] }
                            else { ($sorted[$c / 2 - 1] + $sorted[$c / 2]) / 2 }
                        }
                        default   { throw "Unknown aggregate function '$($agg.function)'." }
                    }
                }
            }
        }
        [pscustomobject]$out
    })
}

# --- Output nodes ----------------------------------------------------------

function Assert-PipelineOutputDirectory {
    param([string]$Path)
    $directory = Split-Path -Path $Path -Parent
    if ($directory -and -not (Test-Path -Path $directory)) {
        New-Item -Path $directory -ItemType Directory -Force | Out-Null
    }
}

function Export-PipelineCsv {
    param([object[]]$Data, [Parameter(Mandatory)][string]$Path, [string]$Delimiter = ',')
    Assert-PipelineOutputDirectory -Path $Path
    # Keep output identical across hosts: 5.1's UTF8 already includes a BOM
    # (which spreadsheets expect); PowerShell 6+ needs to be asked for one.
    $encoding = if ((Get-PipelineEnvironment).Utf8WritesBom) { 'UTF8' } else { 'utf8BOM' }
    $Data | Export-Csv -Path $Path -NoTypeInformation -Delimiter $Delimiter -Encoding $encoding
}

function Export-PipelineJson {
    param([object[]]$Data, [Parameter(Mandatory)][string]$Path)
    Assert-PipelineOutputDirectory -Path $Path
    ConvertTo-Json -InputObject $Data -Depth 10 | Set-Content -Path $Path -Encoding UTF8
}

# --- Execution engine ------------------------------------------------------

function Get-PipelineExecutionOrder {
    # Topological sort (Kahn's algorithm) over the node graph.
    param([Parameter(Mandatory)]$Definition)
    $incoming = @{}
    $adjacent = @{}
    foreach ($node in $Definition.nodes) {
        $incoming[$node.id] = 0
        $adjacent[$node.id] = New-Object System.Collections.ArrayList
    }
    foreach ($edge in @($Definition.edges)) {
        if (-not $incoming.ContainsKey($edge.to) -or -not $adjacent.ContainsKey($edge.from)) {
            throw "Edge '$($edge.from)' -> '$($edge.to)' references a node that does not exist."
        }
        $incoming[$edge.to] = $incoming[$edge.to] + 1
        [void]$adjacent[$edge.from].Add($edge.to)
    }
    $queue = New-Object System.Collections.Queue
    foreach ($node in $Definition.nodes) {
        if ($incoming[$node.id] -eq 0) { $queue.Enqueue($node.id) }
    }
    $order = New-Object System.Collections.ArrayList
    while ($queue.Count -gt 0) {
        $id = $queue.Dequeue()
        [void]$order.Add($id)
        foreach ($next in $adjacent[$id]) {
            $incoming[$next] = $incoming[$next] - 1
            if ($incoming[$next] -eq 0) { $queue.Enqueue($next) }
        }
    }
    if ($order.Count -ne @($Definition.nodes).Count) {
        throw 'Pipeline definition contains a cycle and cannot be executed.'
    }
    @($order)
}

function Invoke-PipelineNode {
    # $Inputs maps input port name ('in', 'left', 'right') to that port's data.
    # $InputList is the ordered list of ALL incoming results (used by multi-input
    # nodes like union, which accept several edges into one port).
    param(
        [Parameter(Mandatory)]$Node,
        [hashtable]$Inputs,
        [object[]]$InputList = @()
    )
    $config = $Node.config
    switch ([string]$Node.type) {
        'input.csv'        { Import-PipelineCsv -Path $config.path -Delimiter $(if ($config.delimiter) { $config.delimiter } else { ',' }) }
        'input.fixedwidth' { Import-PipelineFixedWidth -Path $config.path -Columns @($config.columns) -SkipLines $(if ($config.skipLines) { [int]$config.skipLines } else { 0 }) }
        'input.json'       { Import-PipelineJson -Path $config.path }

        'transform.select'    { Select-PipelineColumn -Data $Inputs['in'] -Columns @($config.columns) }
        'transform.drop'      { Remove-PipelineColumn -Data $Inputs['in'] -Columns @($config.columns) }
        'transform.rename'    { Rename-PipelineColumn -Data $Inputs['in'] -Renames @($config.renames) }
        'transform.derive'    { Add-PipelineColumn -Data $Inputs['in'] -Name $config.name -Template $config.template }
        'transform.filter'    { Where-PipelineRow -Data $Inputs['in'] -Conditions @($config.conditions) -Match $(if ($config.match) { $config.match } else { 'All' }) }
        'transform.sort'      { Sort-PipelineData -Data $Inputs['in'] -SortBy @($config.sortBy) }
        'transform.distinct'  { Select-PipelineDistinct -Data $Inputs['in'] -Columns @($config.columns) }
        'transform.limit'       { Limit-PipelineRow -Data $Inputs['in'] -Mode $(if ($config.mode) { $config.mode } else { 'Top' }) -Count $(if ($null -ne $config.count) { [int]$config.count } else { 10 }) -Start $(if ($config.start) { [int]$config.start } else { 1 }) }
        'transform.index'       { Add-PipelineIndex -Data $Inputs['in'] -Name $(if ($config.name) { $config.name } else { 'Index' }) -Start $(if ($null -ne $config.start) { [int]$config.start } else { 1 }) }
        'transform.replace'     { Edit-PipelineValue -Data $Inputs['in'] -Column $config.column -Find $(if ($null -ne $config.find) { [string]$config.find } else { '' }) -ReplaceWith $(if ($null -ne $config.replaceWith) { [string]$config.replaceWith } else { '' }) -WholeCell:$([bool]$config.wholeCell) }
        'transform.fill'        { Set-PipelineFill -Data $Inputs['in'] -Columns @($config.columns) -Direction $(if ($config.direction) { $config.direction } else { 'Down' }) }
        'transform.conditional' { Add-PipelineConditional -Data $Inputs['in'] -Name $config.name -Rules @($config.rules) -Else $(if ($null -ne $config.'else') { [string]$config.'else' } else { '' }) }
        'transform.text'        { Edit-PipelineText -Data $Inputs['in'] -Column $config.column -Op $(if ($config.op) { $config.op } else { 'trim' }) -Find $(if ($null -ne $config.find) { [string]$config.find } else { '' }) -Find2 $(if ($null -ne $config.find2) { [string]$config.find2 } else { '' }) -As $(if ($config.as) { [string]$config.as } else { '' }) }
        'transform.union'       { Union-PipelineData -Tables $InputList }
        'transform.reorder'     { Select-PipelineColumnOrder -Data $Inputs['in'] -Order @($config.order) }
        'transform.date'        { Convert-PipelineDate -Data $Inputs['in'] -Column $config.column -Op $config.op -Column2 $config.column2 -Format $config.format -As $config.as }
        'transform.cast'        { Convert-PipelineCast -Data $Inputs['in'] -Column $config.column -To $(if ($config.to) { $config.to } else { 'text' }) }
        'transform.unpivot'     { Convert-PipelineUnpivot -Data $Inputs['in'] -Keep @($config.keep) -AttributeName $(if ($config.attributeName) { $config.attributeName } else { 'Attribute' }) -ValueName $(if ($config.valueName) { $config.valueName } else { 'Value' }) }
        'transform.pivot'       { Convert-PipelinePivot -Data $Inputs['in'] -GroupBy @($config.groupBy) -PivotColumn $config.pivotColumn -ValueColumn $config.valueColumn -Aggregate $(if ($config.aggregate) { $config.aggregate } else { 'First' }) }
        'transform.join'      { Join-PipelineData -Left $Inputs['left'] -Right $Inputs['right'] -LeftKey $config.leftKey -RightKey $config.rightKey -JoinType $config.joinType }
        'transform.aggregate' { Group-PipelineData -Data $Inputs['in'] -GroupBy @($config.groupBy) -Aggregations @($config.aggregations) }

        # Output nodes write to disk and pass their data through so they can be chained.
        'output.csv'   { Export-PipelineCsv -Data $Inputs['in'] -Path $config.path -Delimiter $(if ($config.delimiter) { $config.delimiter } else { ',' }); $Inputs['in'] }
        'output.json'  { Export-PipelineJson -Data $Inputs['in'] -Path $config.path; $Inputs['in'] }

        default { throw "Unknown node type '$($Node.type)'." }
    }
}

function Expand-PipelineValue {
    # Recursively replaces ${Name} tokens in every string value of $Value using
    # the $Params map (name -> value). Used to bind runtime parameters into a
    # parsed pipeline definition (paths and any other string config).
    param($Value, [hashtable]$Params)
    if ($null -eq $Value) { return $Value }
    if ($Value -is [string]) {
        $out = $Value
        foreach ($k in $Params.Keys) { $out = $out.Replace('${' + $k + '}', [string]$Params[$k]) }
        return $out
    }
    if ($Value -is [System.Management.Automation.PSCustomObject]) {
        $o = [ordered]@{}
        foreach ($p in $Value.PSObject.Properties) { $o[$p.Name] = Expand-PipelineValue -Value $p.Value -Params $Params }
        return [pscustomobject]$o
    }
    if ($Value -is [object[]]) {
        return @(foreach ($item in $Value) { Expand-PipelineValue -Value $item -Params $Params })
    }
    return $Value
}

function Resolve-PipelineParameter {
    # Effective parameter map = each declared parameter's default, overridden by $Overrides.
    param($Definition, [hashtable]$Overrides = @{})
    $vals = @{}
    foreach ($p in @($Definition.parameters)) {
        if ($null -eq $p -or -not $p.name) { continue }
        $name = [string]$p.name
        $vals[$name] = if ($Overrides.ContainsKey($name)) { [string]$Overrides[$name] } else { [string]$p.default }
    }
    $vals
}

function Invoke-PipelineDefinition {
    <#
    .SYNOPSIS
        Executes a parsed pipeline definition object and returns the data
        produced by its terminal (sink) nodes.
    #>
    param(
        [Parameter(Mandatory)]$Definition,
        [switch]$Quiet,
        [hashtable]$Parameters = @{}
    )
    Assert-PipelineHost
    if ($Definition.parameters) {
        $Definition = Expand-PipelineValue -Value $Definition -Params (Resolve-PipelineParameter -Definition $Definition -Overrides $Parameters)
    }
    $nodesById = @{}
    foreach ($node in $Definition.nodes) { $nodesById[$node.id] = $node }

    $results = @{}
    $hasOutgoing = @{}
    foreach ($edge in @($Definition.edges)) { $hasOutgoing[$edge.from] = $true }

    foreach ($id in (Get-PipelineExecutionOrder -Definition $Definition)) {
        $node = $nodesById[$id]
        $inputs = @{}
        $inputList = New-Object System.Collections.ArrayList
        foreach ($edge in @($Definition.edges)) {
            if ($edge.to -eq $id) {
                $port = if ($edge.toPort) { [string]$edge.toPort } else { 'in' }
                $inputs[$port] = $results[$edge.from]
                [void]$inputList.Add($results[$edge.from])
            }
        }
        if (-not $Quiet) {
            Write-Verbose ("Running node '{0}' ({1})" -f $id, $node.type)
        }
        $results[$id] = @(Invoke-PipelineNode -Node $node -Inputs $inputs -InputList $inputList)
    }

    # Return the output of every leaf node, keyed by node id.
    $terminal = [ordered]@{}
    foreach ($node in $Definition.nodes) {
        if (-not $hasOutgoing.ContainsKey($node.id)) { $terminal[$node.id] = $results[$node.id] }
    }
    $terminal
}

#endregion PSPipeline core functions
</script><!-- /ps-engine-source -->

<!-- Embedded POSIX sh + awk runtime (synced from src/PSPipeline/Core/pipeline-runtime.sh)
     and the shell code generator (synced from tools/shellgen.js). The shell backend
     inlines the runtime and uses the generator to compile a pipeline to a .sh script. -->
<script type="text/plain" id="sh-runtime-source">
# ---------------------------------------------------------------------------
# PSPipeline shell runtime -- the *nix analog of Core/PipelineFunctions.ps1.
# Inlined into every generated POSIX sh + awk script as its engine library
# (after the generated header/usage, before the compiled pipeline body).
#
# Hard constraints (mirror the PowerShell engine's):
#   * POSIX sh + POSIX awk only -- no bash-isms, no gawk extensions, so it runs
#     on busybox/mawk/nawk as well as gawk. No installs, no network.
#   * Intermediate data between nodes is unit-separator (US, 0x1F) delimited with
#     a header row first, so commas/tabs inside data never clash between steps.
#     Only input nodes parse the source format; only output nodes emit it.
#
# String comparisons are case-insensitive to match the PowerShell engine
# (PowerShell -eq/-lt/-like and Sort-Object are case-insensitive by default).
#
# The generated header supplies the shebang, "set -eu", --help, and the BASE
# directory; this fragment defines the work area and the awk helper library.
# ---------------------------------------------------------------------------
WORK="$(mktemp -d 2>/dev/null || mktemp -d -t pspl)"
trap 'rm -rf "$WORK"' EXIT INT TERM
US=$(printf '\037')

AWKLIB='
function trim(s){ sub(/^[ \t\r\n]+/,"",s); sub(/[ \t\r\n]+$/,"",s); return s }
function is_num(x){ return (x ~ /^[ \t]*[-+]?([0-9]+([.][0-9]*)?|[.][0-9]+)([eE][-+]?[0-9]+)?[ \t]*$/) }
function cmp(a,b){ if(is_num(a)&&is_num(b)){a+=0;b+=0;return (a<b)?-1:(a>b?1:0)} a=tolower(a);b=tolower(b);return (a<b)?-1:(a>b?1:0) }
function op_eq(a,b){ return (is_num(a)&&is_num(b)) ? (a+0==b+0) : (tolower(a)==tolower(b)) }
function csv_split(line, D, arr,   n,i,c,field,len,inq){
  n=0; field=""; len=length(line); inq=0
  for(i=1;i<=len;i++){ c=substr(line,i,1)
    if(inq){ if(c=="\""){ if(substr(line,i+1,1)=="\""){field=field "\"";i++} else inq=0 } else field=field c }
    else { if(c=="\""){inq=1} else if(c==D){n++;arr[n]=field;field=""} else field=field c }
  }
  n++; arr[n]=field; return n
}
function csv_quote(s){ gsub(/"/,"\"\"",s); return "\"" s "\"" }
function lit_replace(s, from, to,   out,p,flen){
  if(from=="") return s
  out=""; flen=length(from)
  while((p=index(s,from))>0){ out=out substr(s,1,p-1) to; s=substr(s,p+flen) }
  return out s
}
function txt_before(s,d,  i){ if(d=="")return ""; i=index(s,d); return (i>0)?substr(s,1,i-1):"" }
function txt_after(s,d,  i){ if(d=="")return ""; i=index(s,d); return (i>0)?substr(s,i+length(d)):"" }
function txt_between(s,a,b,  i,start,tail,j){ if(a=="")return ""; i=index(s,a); if(i==0)return ""; start=i+length(a); tail=substr(s,start); if(b=="")return tail; j=index(tail,b); return (j>0)?substr(tail,1,j-1):tail }
function txt_title(s,  n,w,i,out){ n=split(tolower(s),w,/ /); out=""; for(i=1;i<=n;i++){ if(length(w[i])>0) w[i]=toupper(substr(w[i],1,1)) substr(w[i],2); out=out (i>1?" ":"") w[i] } return out }
function txt_op(s,op,a,b){ if(op=="lower")return tolower(s); if(op=="upper")return toupper(s); if(op=="title")return txt_title(s); if(op=="before")return txt_before(s,a); if(op=="after")return txt_after(s,a); if(op=="between")return txt_between(s,a,b); return trim(s) }
'
# --- compiled pipeline body follows ---
</script><!-- /sh-runtime-source -->
<script id="shellgen-source">
'use strict';
// PSPipeline shell (POSIX sh + awk) backend generator.
// Authored/tested here in Node, then mirrored into designer/index.html as
// BACKENDS.shell.generate. Pure function of (def, runtimeText) -> script string.

function generateShellScript(def, runtime) {
  const bad = collectTokenViolations(def);
  if (bad.length) throw new Error('The shell target supports ${parameter} tokens only in input/output paths; found tokens in node(s): ' + bad.join(', ') + '. Use the PowerShell target, or put the parameter in a path.');
  // Layout for a human reader:
  //   header + usage()/--help   ->  shellHeader(def)
  //   engine library (WORK/US/AWKLIB) ->  runtime
  //   parameter env vars        ->  shellParamBlock(def)
  //   pspl_run(): one awk step per node, then call it
  const lib = runtime.replace(/^\s+/, '').replace(/\s+$/, '');
  const body = generateShellBody(def);
  return shellHeader(def) + lib + '\n\n' + shellParamBlock(def)
       + '# --- run the pipeline: one awk step per node ---------------------------------\n'
       + 'pspl_run() {\n' + body + '\n}\n\n'
       + 'pspl_run\n';
}

// Generated top matter: shebang, a short header, set -eu, a --help usage function,
// argument handling, and the BASE directory. (The runtime that follows is the engine
// library only -- WORK/US/AWKLIB -- so help works before any work is done.)
function shellHeader(def) {
  const name = (def && def.name) ? String(def.name) : 'pipeline';
  const file = name + '.sh';
  const ps = ((def && def.parameters) || []).filter(p => p && p.name);
  const paramDoc = ps.length
    ? ps.map(p => '  PSPL_' + p.name + '=<value>     (default: ' + (p.default == null || p.default === '' ? 'empty' : String(p.default)) + ')').join('\n')
    : '  (this pipeline has no runtime parameters)';
  const usage =
    'pspl_usage() {\n' +
    "  cat <<'PSPL_USAGE'\n" +
    name + ' -- a self-contained PSPipeline data pipeline (POSIX sh + awk).\n' +
    '\n' +
    'Usage:\n' +
    '  sh ' + file + ' [BASE_DIR]      Run the pipeline. BASE_DIR is the directory that\n' +
    '                              relative input/output paths resolve against (default: .).\n' +
    '  sh ' + file + ' -h | --help     Show this help and exit.\n' +
    '\n' +
    'Runtime parameters (override with environment variables, e.g. PSPL_Name=value sh ' + file + '):\n' +
    paramDoc + '\n' +
    'PSPL_USAGE\n' +
    '}\n';
  return [
    '#!/bin/sh',
    '# ' + name + ' -- generated by PSPipeline (POSIX sh + awk). Self-contained; no install.',
    '# Run:   sh ' + file + ' [BASE_DIR]',
    '# Help:  sh ' + file + ' -h',
    'set -eu',
    '',
    usage,
    'case "${1:-}" in',
    '  -h|--help|-\\?) pspl_usage; exit 0 ;;',
    'esac',
    '',
    '# BASE: directory that relative input/output paths resolve against (default: .).',
    'BASE="${1:-.}"',
    'cd "$BASE"',
    '',
    ''
  ].join('\n');
}

// shell single-quote
function shq(s) { return "'" + String(s).replace(/'/g, "'\\''") + "'"; }
// awk string literal
function aws(s) {
  return '"' + String(s)
    .replace(/\\/g, '\\\\').replace(/"/g, '\\"')
    .replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t') + '"';
}
function col(name) { return '$(c[' + aws(name) + '])'; }
function wf(id) { return '"$WORK/' + id + '"'; }

// --- pipeline parameters ----------------------------------------------------
// escape for inside a double-quoted shell string
function shDqEscape(s) { return String(s).replace(/([\\"$`])/g, '\\$1'); }
// a path config string: ${Name} tokens -> ${P_Name} shell vars; plain literal otherwise
function shellPath(s) {
  s = String(s);
  if (!/\$\{[A-Za-z0-9_]+\}/.test(s)) return shq(s);
  let out = '"', last = 0, m; const re = /\$\{([A-Za-z0-9_]+)\}/g;
  while ((m = re.exec(s)) !== null) { out += shDqEscape(s.slice(last, m.index)) + '${P_' + m[1] + '}'; last = re.lastIndex; }
  return out + shDqEscape(s.slice(last)) + '"';
}
function shellParamBlock(def) {
  const ps = (def.parameters || []).filter(p => p && p.name);
  if (!ps.length) return '';
  return ps.map(p => 'P_' + p.name + '="${PSPL_' + p.name + ':-' + shDqEscape(String(p.default == null ? '' : p.default)) + '}"').join('\n') + '\n\n';
}
// shell target supports ${parameter} tokens only in input/output paths
function collectTokenViolations(def) {
  const bad = new Set();
  function scan(val, allowed, id) {
    if (typeof val === 'string') { if (!allowed && /\$\{[A-Za-z0-9_]+\}/.test(val)) bad.add(id); return; }
    if (Array.isArray(val)) { val.forEach(v => scan(v, false, id)); return; }
    if (val && typeof val === 'object') { Object.keys(val).forEach(k => scan(val[k], false, id)); return; }
  }
  (def.nodes || []).forEach(n => { const cfg = n.config || {}; Object.keys(cfg).forEach(k => scan(cfg[k], k === 'path', n.id)); });
  return [...bad];
}

function topoOrder(def) {
  const indeg = {}, adj = {};
  for (const n of def.nodes) { indeg[n.id] = 0; adj[n.id] = []; }
  for (const e of (def.edges || [])) {
    if (!(e.to in indeg) || !(e.from in adj)) throw new Error("Edge references a missing node: " + e.from + " -> " + e.to);
    indeg[e.to]++; adj[e.from].push(e.to);
  }
  const q = def.nodes.filter(n => indeg[n.id] === 0).map(n => n.id);
  const order = [];
  while (q.length) {
    const id = q.shift(); order.push(id);
    for (const nx of adj[id]) if (--indeg[nx] === 0) q.push(nx);
  }
  if (order.length !== def.nodes.length) throw new Error("Pipeline contains a cycle.");
  return order;
}

function inputsOf(def, id) {
  const ins = {};
  for (const e of (def.edges || [])) if (e.to === id) ins[e.toPort || 'in'] = e.from;
  return ins;
}

// awk that reads a US-delimited file, maps header names to indices in c[], prints header, then runs body
function header(extra) {
  return 'NR==1{ for(i=1;i<=NF;i++)c[$i]=i; ' + extra + ' next }';
}

function deriveExpr(template) {
  // split into literal/token parts; token -> field lookup with literal fallback
  const parts = [];
  const re = /\{([^}]+)\}/g; let last = 0, m;
  while ((m = re.exec(template)) !== null) {
    if (m.index > last) parts.push(aws(template.slice(last, m.index)));
    const name = m[1];
    parts.push('(' + aws(name) + ' in c ? $(c[' + aws(name) + ']) : ' + aws('{' + name + '}') + ')');
    last = re.lastIndex;
  }
  if (last < template.length) parts.push(aws(template.slice(last)));
  return parts.length ? parts.join(' ') : '""';
}

function condExpr(cond) {
  const f = col(cond.column), v = aws(String(cond.value == null ? '' : cond.value));
  switch (String(cond.operator)) {
    case 'eq': return 'op_eq(' + f + ',' + v + ')';
    case 'ne': return '!op_eq(' + f + ',' + v + ')';
    case 'gt': return '(cmp(' + f + ',' + v + ')>0)';
    case 'ge': return '(cmp(' + f + ',' + v + ')>=0)';
    case 'lt': return '(cmp(' + f + ',' + v + ')<0)';
    case 'le': return '(cmp(' + f + ',' + v + ')<=0)';
    case 'contains':   return '(index(tolower(' + f + '),tolower(' + v + '))>0)';
    case 'startswith': return '(substr(tolower(' + f + '),1,length(' + v + '))==tolower(' + v + '))';
    case 'endswith':   return '(length(' + f + ')>=length(' + v + ') && substr(tolower(' + f + '),length(' + f + ')-length(' + v + ')+1)==tolower(' + v + '))';
    case 'isempty':    return '(' + f + '=="")';
    case 'isnotempty': return '(' + f + '!="")';
    default: throw new Error("Unknown filter operator '" + cond.operator + "'.");
  }
}

function awkStep(prog, inFiles, outId) {
  return "awk -v US=\"$US\" \"$AWKLIB\"'\n" + prog + "\n' " + inFiles + ' > ' + wf(outId);
}

function genNode(def, node) {
  const cfg = node.config || {};
  const ins = inputsOf(def, node.id);
  const t = String(node.type);
  const label = '# ' + node.id + ' (' + t + ')' + (node.label ? '  ' + node.label.replace(/\n/g, ' ') : '');

  if (t === 'input.json' || t === 'output.json') {
    throw new Error("The shell target does not support JSON nodes yet (node '" + node.id + "'). Use delimited text, or generate the PowerShell target.");
  }

  let prog;
  switch (t) {
    case 'input.csv': {
      const d = cfg.delimiter ? String(cfg.delimiter) : ',';
      prog = '{ sub(/\\r$/,""); if($0=="")next; n=csv_split($0, ' + aws(d) + ', f); o=""; for(i=1;i<=n;i++) o=o (i>1?US:"") f[i]; print o }';
      return label + '\n' + awkStep(prog, shellPath(String(cfg.path)), node.id);
    }
    case 'input.fixedwidth': {
      const cols = (cfg.columns || []);
      const head = cols.map(cc => aws(String(cc.name))).join(' US ');
      const skip = cfg.skipLines ? parseInt(cfg.skipLines, 10) : 0;
      const extract = cols.map(cc => 'trim(substr($0,' + parseInt(cc.start, 10) + ',' + parseInt(cc.length, 10) + '))').join(' US ');
      prog = 'BEGIN{ print ' + head + ' }\n'
           + (skip > 0 ? 'NR<=' + skip + '{next}\n' : '')
           + '{ sub(/\\r$/,""); if($0=="")next; print ' + extract + ' }';
      return label + '\n' + 'awk -v US="$US" "$AWKLIB"\'\n' + prog + '\n\' ' + shellPath(String(cfg.path)) + ' > ' + wf(node.id);
    }
    case 'transform.select': {
      const cols = (cfg.columns || []).map(String);
      const h = cols.map(aws).join(' OFS ');
      const body = cols.map(col).join(' OFS ');
      prog = 'BEGIN{FS=US;OFS=US}\n' + header('print ' + h + ';') + '\n{ print ' + body + ' }';
      return label + '\n' + awkStep(prog, wf(ins['in']), node.id);
    }
    case 'transform.drop': {
      const drops = (cfg.columns || []).map(String);
      const init = drops.map(d => 'drop[' + aws(d) + ']=1;').join(' ');
      prog = 'BEGIN{FS=US;OFS=US; ' + init + '}\n'
           + 'NR==1{ k=0; h=""; for(i=1;i<=NF;i++){ if(!($i in drop)){ keep[++k]=i; h=h (k>1?OFS:"") $i } } print h; next }\n'
           + '{ o=""; for(i=1;i<=k;i++) o=o (i>1?OFS:"") $(keep[i]); print o }';
      return label + '\n' + awkStep(prog, wf(ins['in']), node.id);
    }
    case 'transform.rename': {
      const init = (cfg.renames || []).map(r => 'ren[' + aws(String(r.from)) + ']=' + aws(String(r.to)) + ';').join(' ');
      prog = 'BEGIN{FS=US;OFS=US; ' + init + '}\n'
           + 'NR==1{ h=""; for(i=1;i<=NF;i++){ nm=$i; if(nm in ren)nm=ren[nm]; h=h (i>1?OFS:"") nm } print h; next }\n'
           + '{ print $0 }';
      return label + '\n' + awkStep(prog, wf(ins['in']), node.id);
    }
    case 'transform.derive': {
      prog = 'BEGIN{FS=US;OFS=US}\n' + header('print $0 OFS ' + aws(String(cfg.name)) + ';') + '\n{ print $0 OFS (' + deriveExpr(String(cfg.template || '')) + ') }';
      return label + '\n' + awkStep(prog, wf(ins['in']), node.id);
    }
    case 'transform.filter': {
      const conds = (cfg.conditions || []).map(condExpr);
      const joined = conds.length ? conds.join(String(cfg.match) === 'Any' ? ' || ' : ' && ') : '1';
      prog = 'BEGIN{FS=US;OFS=US}\nNR==1{ for(i=1;i<=NF;i++)c[$i]=i; print $0; next }\n{ if(' + joined + ') print $0 }';
      return label + '\n' + awkStep(prog, wf(ins['in']), node.id);
    }
    case 'transform.sort': {
      const keys = (cfg.sortBy || []);
      const capture = keys.map((k, i) => 'kv' + i + '[n]=' + col(k.column)).join('; ');
      let cmpBody = '';
      keys.forEach((k, i) => {
        const dir = (k.descending ? '-' : '') ;
        cmpBody += 'r=' + dir + 'cmp(kv' + i + '[a],kv' + i + '[b]); if(r!=0)return r; ';
      });
      prog = 'BEGIN{FS=US;OFS=US}\n'
           + 'function keycmp(a,b,  r){ ' + cmpBody + 'return 0 }\n'
           + 'NR==1{ for(i=1;i<=NF;i++)c[$i]=i; print $0; next }\n'
           + '{ rows[++n]=$0; idx[n]=n; ' + capture + ' }\n'
           + 'END{ for(p=2;p<=n;p++){ pi=idx[p]; q=p-1; while(q>=1 && keycmp(idx[q],pi)>0){ idx[q+1]=idx[q]; q-- } idx[q+1]=pi } for(i=1;i<=n;i++) print rows[idx[i]] }';
      return label + '\n' + awkStep(prog, wf(ins['in']), node.id);
    }
    case 'transform.distinct': {
      const cols = (cfg.columns || []).map(String);
      const keyExpr = cols.length ? cols.map(col).join(' US ') : '$0';
      const capture = cols.length ? cols.map((cn, i) => 'kv' + i + '[n]=' + col(cn)).join('; ') : 'kv0[n]=$0';
      let cmpBody = '';
      const kcols = cols.length ? cols : ['__row__'];
      kcols.forEach((cn, i) => { cmpBody += 'r=cmp(kv' + i + '[a],kv' + i + '[b]); if(r!=0)return r; '; });
      prog = 'BEGIN{FS=US;OFS=US}\n'
           + 'function keycmp(a,b,  r){ ' + cmpBody + 'return 0 }\n'
           + 'NR==1{ for(i=1;i<=NF;i++)c[$i]=i; print $0; next }\n'
           + '{ rows[++n]=$0; idx[n]=n; key[n]=' + keyExpr + '; ' + capture + ' }\n'
           + 'END{ for(p=2;p<=n;p++){ pi=idx[p]; q=p-1; while(q>=1 && keycmp(idx[q],pi)>0){ idx[q+1]=idx[q]; q-- } idx[q+1]=pi } '
           + 'for(i=1;i<=n;i++){ kk=key[idx[i]]; if(!(kk in seen)){ seen[kk]=1; print rows[idx[i]] } } }';
      return label + '\n' + awkStep(prog, wf(ins['in']), node.id);
    }
    case 'transform.limit': {
      const mode = String(cfg.mode || 'Top');
      const count = cfg.count != null ? parseInt(cfg.count, 10) : 10;
      const start = cfg.start != null ? parseInt(cfg.start, 10) : 1;
      let end;
      if (mode === 'Bottom') end = 'END{ s=n-' + count + '+1; if(s<1)s=1; for(i=s;i<=n;i++)print rows[i] }';
      else if (mode === 'Range') end = 'END{ s=' + start + '; if(s<1)s=1; e=s+' + count + '-1; if(e>n)e=n; for(i=s;i<=e;i++)print rows[i] }';
      else end = 'END{ e=' + count + '; if(e>n)e=n; for(i=1;i<=e;i++)print rows[i] }';
      prog = 'BEGIN{FS=US;OFS=US}\nNR==1{ print; next }\n{ rows[++n]=$0 }\n' + end;
      return label + '\n' + awkStep(prog, wf(ins['in']), node.id);
    }
    case 'transform.index': {
      const start = cfg.start != null ? parseInt(cfg.start, 10) : 1;
      prog = 'BEGIN{FS=US;OFS=US; idx=' + start + '}\nNR==1{ print $0 OFS ' + aws(String(cfg.name || 'Index')) + '; next }\n{ print $0 OFS idx; idx++ }';
      return label + '\n' + awkStep(prog, wf(ins['in']), node.id);
    }
    case 'transform.replace': {
      const colName = aws(String(cfg.column));
      const find = aws(cfg.find != null ? String(cfg.find) : '');
      const repl = aws(cfg.replaceWith != null ? String(cfg.replaceWith) : '');
      const apply = cfg.wholeCell
        ? 'if(tolower(v)==tolower(' + find + ')) v=' + repl + ';'
        : 'v=lit_replace(v,' + find + ',' + repl + ');';
      prog = 'BEGIN{FS=US;OFS=US}\nNR==1{ for(i=1;i<=NF;i++)c[$i]=i; print; next }\n{ ci=c[' + colName + ']; if(ci){ v=$ci; ' + apply + ' $ci=v } print }';
      return label + '\n' + awkStep(prog, wf(ins['in']), node.id);
    }
    case 'transform.fill': {
      const loop = String(cfg.direction) === 'Up' ? 'for(i=rn;i>=1;i--)' : 'for(i=1;i<=rn;i++)';
      const blocks = (cfg.columns || []).map(cn =>
        'ci=c[' + aws(String(cn)) + ']; if(ci){ last=""; ' + loop + '{ if(cell[i,ci]==""){ if(last!="") cell[i,ci]=last } else last=cell[i,ci] } }'
      ).join(' ');
      prog = 'BEGIN{FS=US;OFS=US}\n'
           + 'NR==1{ for(i=1;i<=NF;i++)c[$i]=i; nf=NF; print; next }\n'
           + '{ rn++; for(j=1;j<=nf;j++) cell[rn,j]=$j }\n'
           + 'END{ ' + blocks + ' for(i=1;i<=rn;i++){ line=cell[i,1]; for(j=2;j<=nf;j++) line=line OFS cell[i,j]; print line } }';

            case 'format': return 'Date.ToText(' + dx(rA) + ', [Format = ' + mStr(String(cfg.format || 'yyyy-MM-dd')) + '])';

      case 'transform.unpivot':
        return 'Table.UnpivotOtherColumns(' + inn() + ', ' + mList(cfg.keep || []) + ', ' + mStr(cfg.attributeName || 'Attribute') + ', ' + mStr(cfg.valueName || 'Value') + ')';
      case 'transform.pivot': {
        // Table.Pivot groups by every column that is not the attribute/value column,
        // so the input should carry only the groupBy + pivot + value columns.
        const aggm = { Sum: ', each List.Sum(List.Transform(_, each try Number.From(_) otherwise null))', Count: ', each List.Count(_)', First: ', each List.First(_)' }[String(cfg.aggregate || 'First')] || ', each List.First(_)';

      '//  ' + title + ' -- Power Query (M), generated by PSPipeline.',
      '//',
      '//  How to use:',
      '//    Excel    : Data > Get Data > Blank Query > Advanced Editor, paste, Done.',
      '//    Power BI : Home > Transform data > New Source > Blank Query >',
      '//               Advanced Editor, paste, Done.',
      '//',
      '//  Each "let" step below is one node of the pipeline, named after that node.',
      '//  Columns import as text; set column types in Power Query as needed (the export',
      '//  coerces numbers inside aggregations, but does not type the whole table).',
      '// ===========================================================================',
      'let',
      steps.join(',\n'),
      'in',
      '    ' + ref(result),
      ''

<script id="psgen-source">
'use strict';
// PSPipeline PowerShell backend generator.
// Authored/tested here in Node, then mirrored into designer/index.html as the
// BACKENDS.powershell builder. Pure function of (def, engineText) -> script string.
//
// The generated .ps1 is laid out for a human to read:
//   1. comment-based help (so Get-Help works) + #Requires
//   2. a script param block (so the file can be run directly), incl. -Help
//   3. ONE small entry function, Invoke-DataPipeline -- the whole "run it" story
//   4. the embedded transform engine in a clearly fenced region
//   5. an entry-point tail: run the pipeline when executed directly, or just
//      define the function when dot-sourced.

function psStr(s) { return String(s == null ? '' : s).replace(/'/g, "''"); }

function buildPowerShellScript(def, engine) {
  const fn = 'Invoke-DataPipeline';
  const name = (def && def.name) ? String(def.name) : 'pipeline';
  const json = JSON.stringify(def, null, 2);
  if (/^'@/m.test(json)) {
    throw new Error("A value in the pipeline produces a line starting with '@, which would close the embedded here-string. Rename it and try again.");
  }
  const params = ((def && def.parameters) || []).filter(p => p && p.name);

  // .PARAMETER blocks for the script-level comment-based help
  const paramDocs = [];
  params.forEach(p => {
    const d = (p.default == null || p.default === '') ? '(empty)' : String(p.default);
    paramDocs.push('.PARAMETER ' + p.name);
    paramDocs.push('    Pipeline parameter (default: ' + d + ').');
  });

  // script-level param() -- lets the file be invoked directly; ends with -Help
  const scriptParams = ['    [string]$BasePath,']
    .concat(params.map(p => "    [string]$" + p.name + " = '" + psStr(p.default) + "',"))
    .concat(['    [switch]$Help']);

  // function-level param() -- BasePath plus the pipeline parameters (no -Help)
  const fnParams = params.length
    ? ['        [string]$BasePath,'].concat(params.map((p, i) =>
        "        [string]$" + p.name + " = '" + psStr(p.default) + "'" + (i < params.length - 1 ? ',' : '')))
    : ['        [string]$BasePath'];

  const paramAssign = ['    $Params = @{}'].concat(params.map(p =>
    "    $Params['" + psStr(p.name) + "'] = $" + p.name));

  return [
    '#Requires -Version 5.1',
    '',
    '<#',
    '.SYNOPSIS',
    '    Run the "' + name + '" data pipeline. Self-contained: no module, no install, PowerShell 5.1+.',
    '.DESCRIPTION',
    '    Generated by PSPipeline. Reads the inputs, applies the transforms, and writes the',
    '    outputs described by the pipeline embedded below. The transform engine is inlined in',
    '    the "Embedded engine" region near the foot of the file; you should not need to read',
    '    or edit it.',
    '',
    '    Run this script directly to execute the pipeline, or dot-source it to load the',
    '    ' + fn + ' function and call it yourself.',
    '.PARAMETER BasePath',
    '    Directory that relative input/output paths resolve against. Defaults to the working directory.'
  ].concat(paramDocs).concat([
    '.PARAMETER Help',
    '    Show this help and exit.',
    '.EXAMPLE',
    '    .\\' + fn + '.ps1',
    '    Run the pipeline against files in the current directory.',
    '.EXAMPLE',
    '    .\\' + fn + '.ps1 -BasePath C:\\Data -Verbose',
    '.EXAMPLE',
    '    . .\\' + fn + '.ps1; ' + fn,
    '    Dot-source to load the function, then call it.',
    '.NOTES',
    '    Pipeline : ' + name,
    '    Generated by PSPipeline.',
    '#>',
    '',
    '[CmdletBinding()]',
    'param(',
  ]).concat(scriptParams).concat([
    ')',
    '',
    'function ' + fn + ' {',
    '    <#',
    '    .SYNOPSIS',
    '        Run the embedded "' + name + '" pipeline and return its result rows.',
    '    .PARAMETER BasePath',
    '        Directory that relative input/output paths resolve against.',
    '    #>',
    '    [CmdletBinding()]',
    '    param(',
  ]).concat(fnParams).concat([
    '    )',
    '',
    "    $pipelineJson = @'",
    json,
    "'@",
    '',
  ]).concat(paramAssign).concat([
    '',
    '    if ($BasePath) { Push-Location -Path $BasePath }',
    '    try {',
    '        Invoke-PipelineDefinition -Definition ($pipelineJson | ConvertFrom-Json) -Parameters $Params',
    '    }',
    '    finally {',
    '        if ($BasePath) { Pop-Location }',
    '    }',
    '}',
    '',
    '# ===========================================================================',
    '#   Embedded transform engine',
    '#   Inlined from PSPipeline Core/PipelineFunctions.ps1 -- generated code.',
    '#   Do not edit by hand; re-export from the designer to regenerate.',
    '# ===========================================================================',
    '',
    String(engine).replace(/\s+$/, ''),
    '',
    '# ===========================================================================',
    '#   End embedded engine',
    '# ===========================================================================',
    '',
    '# Entry point: run the pipeline when this file is executed directly; when it is',
    '# dot-sourced (". .\\' + fn + '.ps1") only the function above is defined.',
    'if ($Help) { Get-Help -Name $PSCommandPath -Full; return }',
    "if ($MyInvocation.InvocationName -ne '.') {",
    "    [void]$PSBoundParameters.Remove('Help')",
    '    ' + fn + ' @PSBoundParameters',
    '}',
    ''
  ]).join('\n');
}

if (typeof module !== 'undefined' && module.exports) module.exports = { buildPowerShellScript };
</script><!-- /psgen-source -->
